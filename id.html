async function submitDynamicForm(e){e.preventDefault();var id=e.target.id;if(id==='formDocument'){var file=document.getElementById('docFile').files[0];var base64=file?await fileToBase64(file):'';return simpleAction('uploadInternDocument',{userId:currentUser.USER_ID,jenis:val('docType'),fileBase64:base64,fileName:file?file.name:''},'Dokumen diupload');}if(id==='formKpi')return simpleAction('createKpiTarget',{targetUser:val('kpiUser'),target:val('kpiTitle'),status:val('kpiStatus'),createdBy:currentUser.USERNAME},'KPI dibuat');if(id==='formEvaluation')return simpleAction('submitInternEvaluation',{targetUser:val('evalUser'),nilai:val('evalScore'),catatan:val('evalNote'),createdBy:currentUser.USERNAME},'Evaluasi disimpan');if(id==='formCertificate')return simpleAction('generateInternshipCertificate',{targetUser:val('certUser'),jenis:val('certType'),generatedBy:currentUser.USERNAME},'Dokumen dibuat');if(id==='formLocation')return simpleAction('createAttendanceLocation',{namaLokasi:val('locName'),latitude:val('locLat'),longitude:val('locLng'),radius:val('locRadius'),createdBy:currentUser.USERNAME},'Lokasi disimpan');if(id==='formEvent')return simpleAction('createEvent',{namaEvent:val('eventName'),tanggal:val('eventDate'),lokasi:val('eventLocation'),createdBy:currentUser.USERNAME},'Event dibuat');if(id==='formAnnouncement')return simpleAction('createAnnouncement',{judul:val('annTitle'),isi:val('annBody'),status:val('annStatus'),createdBy:currentUser.USERNAME},'Pengumuman dibuat');if(id==='formNotification')return simpleAction('createNotification',{target:val('notifTarget'),judul:val('notifTitle'),pesan:val('notifMessage'),createdBy:currentUser.USERNAME},'Notifikasi dikirim');}
async function simpleAction(action,payload,msg){showLoading('Memproses...','Menyimpan data.');try{var r=await api(action,payload);if(!r.success)throw new Error(r.message);toast(msg||'Berhasil',r.message||'Data tersimpan.','success');loadForView((document.querySelector('.view.active')||{}).id?document.querySelector('.view.active').id.replace('view-',''):'');}catch(e){toast('Gagal',e.message,'error');}finally{hideLoading();}}
function addWorkItem(){workItemCounter++;var div=document.createElement('div');div.className='work-item';div.setAttribute('data-work-item',workItemCounter);div.innerHTML='<div class="panel-head"><div><h2 style="font-size:15px">Kegiatan '+workItemCounter+'</h2><p>Isi detail</p></div><button type="button" class="btn btn-red remove-work">Hapus</button></div><div class="grid2"><div class="field"><input class="work-start" type="time" placeholder=" "><label>Mulai</label></div><div class="field"><input class="work-end" type="time" placeholder=" "><label>Selesai</label></div></div><div style="height:10px"></div><div class="field"><textarea class="work-desc" placeholder=" " required></textarea><label>Uraian</label></div><div style="height:10px"></div><label class="btn btn-secondary btn-full">Dokumentasi<input class="work-photo file-hidden" type="file" accept="image/*"></label>';var w=document.getElementById('workItems');if(w)w.appendChild(div);div.querySelector('.remove-work').addEventListener('click',function(){if(document.querySelectorAll('[data-work-item]').length<=1)return;div.remove();saveWorkDraft();});}
var draftTimer=null;function saveWorkDraftDebounced(){clearTimeout(draftTimer);draftTimer=setTimeout(saveWorkDraft,350);}function saveWorkDraft(){if(!currentUser)return;var items=[].slice.call(document.querySelectorAll('[data-work-item]')).map(function(b){return {start:b.querySelector('.work-start').value,end:b.querySelector('.work-end').value,desc:b.querySelector('.work-desc').value};});localStorage.setItem('iTrack_workDraft_'+currentUser.USER_ID,JSON.stringify({date:val('workDate'),division:val('workDivision'),note:val('workNote'),items:items}));text('draftStatus','Draft tersimpan');}
function loadWorkDraft(){try{var raw=localStorage.getItem('iTrack_workDraft_'+currentUser.USER_ID);if(!raw)return;var d=JSON.parse(raw);setValue('workDate',d.date);setValue('workDivision',d.division);setValue('workNote',d.note);}catch(e){}}
function clearWorkDraft(){localStorage.removeItem('iTrack_workDraft_'+currentUser.USER_ID);toast('Draft dihapus','Form draft dibersihkan.','success');}
async function submitWorkReportForm(e){e.preventDefault();var blocks=[].slice.call(document.querySelectorAll('[data-work-item]')),items=[];showLoading('Mengirim laporan...','Menyimpan data.');try{for(var i=0;i<blocks.length;i++){var b=blocks[i],file=b.querySelector('.work-photo').files[0],photo=file?await compressImageFile(file,700,.58):'';items.push({jamMulai:b.querySelector('.work-start').value,jamSelesai:b.querySelector('.work-end').value,uraianKegiatan:b.querySelector('.work-desc').value,photoBase64:photo});}var r=await api('submitWorkReport',{userId:currentUser.USER_ID,tanggal:val('workDate'),divisi:val('workDivision'),catatanUser:val('workNote'),items:items});if(!r.success)throw new Error(r.message);clearWorkDraft();toast('Laporan terkirim',r.message,'success');loadMyReports();}catch(e){toast('Laporan gagal',e.message,'error');}finally{hideLoading();}}
async function submitLeaveForm(e){e.preventDefault();showLoading('Mengirim izin...','Menyimpan data.');try{var f=document.getElementById('leaveProof').files[0],b=f?await compressImageFile(f,700,.58):'';var r=await api('submitLeave',{userId:currentUser.USER_ID,jenisIzin:val('leaveType'),tanggalMulai:val('leaveStart'),tanggalSelesai:val('leaveEnd'),alasan:val('leaveReason'),buktiBase64:b});if(!r.success)throw new Error(r.message);toast('Izin terkirim',r.message,'success');loadMyLeaves();}catch(e){toast('Izin gagal',e.message,'error');}finally{hideLoading();}}
function fillProfileForm(){if(!currentUser)return;setValue('profileFullName',currentUser.NAMA_LENGKAP);setValue('profileUsername',currentUser.USERNAME);setValue('profileEmail',currentUser.EMAIL);setValue('profilePhone',currentUser.NO_HP);setValue('profileDivision',currentUser.DIVISI||'Internship / Magang');setValue('profilePosition',currentUser.JABATAN);setLargeAvatar();}
async function handleProfilePhoto(e){var f=e.target.files&&e.target.files[0];if(!f)return;var b=await compressImageFile(f,640,.58);simpleAction('updateProfilePhotoBase64',{userId:currentUser.USER_ID,photoBase64:b},'Foto diperbarui');}
async function submitProfileDetails(e){e.preventDefault();simpleAction('updateUserProfileDetails',{userId:currentUser.USER_ID,namaLengkap:val('profileFullName'),email:val('profileEmail'),noHp:val('profilePhone'),divisi:val('profileDivision'),jabatan:val('profilePosition')},'Profil diperbarui');}
function loadPeopleList(){api('getAdminData',{}).then(function(names){var arr=Array.isArray(names)?names:[];['attPerson','repPerson','expPerson'].forEach(function(id){var el=document.getElementById(id);if(el)el.innerHTML='<option value="">Semua Peserta</option>'+arr.map(function(n){return '<option>'+esc(n)+'</option>';}).join('');});}).catch(function(){});}
async function exportAttendancePdf(x){var r=await api('exportAttendancePdf',exportPayload(x,'attendance'));if(r.success&&r.data&&r.data.fileUrl)window.open(r.data.fileUrl,'_blank');toast(r.success?'Export berhasil':'Export gagal',r.message||'',r.success?'success':'error');}
async function exportWorkReportPdf(x){var r=await api('exportWorkReportPdf',exportPayload(x,'report'));if(r.success&&r.data&&r.data.fileUrl)window.open(r.data.fileUrl,'_blank');toast(r.success?'Export berhasil':'Export gagal',r.message||'',r.success?'success':'error');}
async function exportAttendanceCsv(){var r=await api('exportAttendanceCsv',exportPayload(true,'attendance'));if(r.success)downloadText('absensi-iTrack.csv',r.data&&r.data.csv?r.data.csv:'');}
async function exportWorkCsv(){var r=await api('exportWorkReportCsv',exportPayload(true,'report'));if(r.success)downloadText('laporan-iTrack.csv',r.data&&r.data.csv?r.data.csv:'');}
function exportPayload(fromExport,type){if(fromExport)return{startDate:val('expStart'),endDate:val('expEnd'),officerName:val('expPerson'),exportedBy:currentUser?currentUser.USERNAME:'',emailTo:currentUser?currentUser.EMAIL:''};if(type==='report')return{startDate:val('repStart'),endDate:val('repEnd'),officerName:val('repPerson'),exportedBy:currentUser?currentUser.USERNAME:'',emailTo:currentUser?currentUser.EMAIL:''};return{startDate:val('attStart'),endDate:val('attEnd'),officerName:val('attPerson'),exportedBy:currentUser?currentUser.USERNAME:'',emailTo:currentUser?currentUser.EMAIL:''};}
function openModal(html){document.getElementById('mainModalCard').innerHTML=html;document.getElementById('mainModal').classList.add('show');}
function closeModal(){document.getElementById('mainModal').classList.remove('show');}
function info(l,v){return '<div class="info-box"><small>'+esc(l)+'</small><span>'+esc(v||'-')+'</span></div>';}
function initDates(){var n=new Date();text('todayLabel',formatLongDate(n));text('todayAdminLabel',formatLongDate(n));text('attendanceDateLabel',formatLongDate(n));}
function setDefaultDates(){var d=toDateInput(new Date());['workDate','leaveStart','leaveEnd','attStart','attEnd','repStart','repEnd','expStart','expEnd','eventDate'].forEach(function(id){var el=document.getElementById(id);if(el)el.value=d;});}
function updateUserUI(){text('topName',currentUser.NAMA_LENGKAP||currentUser.USERNAME);text('topRole',(currentUser.ROLE||'-')+' • '+(currentUser.STATUS_AKUN||'-'));var av=document.getElementById('topAvatar');av.textContent=(currentUser.NAMA_LENGKAP||currentUser.USERNAME||'I').charAt(0).toUpperCase();if(currentUser.PHOTO_URL){av.style.backgroundImage='url("'+currentUser.PHOTO_URL+'")';av.textContent='';}}
function setLargeAvatar(){var av=document.getElementById('profileAvatar');if(!av||!currentUser)return;av.textContent=(currentUser.NAMA_LENGKAP||currentUser.USERNAME||'I').charAt(0).toUpperCase();if(currentUser.PHOTO_URL){av.style.backgroundImage='url("'+currentUser.PHOTO_URL+'")';av.textContent='';}}
function normalizeUser(u){u=u||{};return{USER_ID:u.USER_ID||u.userId||'',USERNAME:u.USERNAME||u.username||'',NAMA_LENGKAP:u.NAMA_LENGKAP||u.namaLengkap||u.name||'',ROLE:u.ROLE||u.role||'',STATUS_AKUN:u.STATUS_AKUN||u.statusAkun||u.status||'',PHOTO_URL:u.PHOTO_URL||u.photoUrl||u.photo||'',EMAIL:u.EMAIL||u.email||'',DIVISI:u.DIVISI||u.divisi||'',JABATAN:u.JABATAN||u.jabatan||'',NO_HP:u.NO_HP||u.noHp||'',TANGGAL_MULAI_MAGANG:u.TANGGAL_MULAI_MAGANG||'',TANGGAL_SELESAI_MAGANG:u.TANGGAL_SELESAI_MAGANG||''};}
function isAdminRole(r){r=String(r||'').toUpperCase();return['SUPER_ADMIN','SUPERADMIN','ADMIN','SUPERVISOR'].indexOf(r)>-1;}
function clearSensitive(){['loginPassword','regPassword','regPassword2','otpPassword','otpPassword2'].forEach(function(id){var e=document.getElementById(id);if(e)e.value='';});}
function badge(v){var s=String(v||'-').toUpperCase(),c='badge-default';if(['AKTIF','HADIR','DISETUJUI','VALID','SELESAI'].indexOf(s)>-1)c='badge-success';if(['TERLAMBAT','MENUNGGU','MENUNGGU_REVIEW','MENUNGGU_VERIFIKASI','REVISI','PERLU_REVIEW'].indexOf(s)>-1)c='badge-warning';if(['IZIN','SAKIT','DINAS_LUAR','IZIN_PRIBADI','CUTI','LUAR_LOKASI'].indexOf(s)>-1)c='badge-info';if(['DITOLAK','NONAKTIF','ALPHA','INVALID'].indexOf(s)>-1)c='badge-danger';return'<span class="badge '+c+'">'+esc(displayStatus(s))+'</span>';}
function displayStatus(s){return String(s||'-').replace(/_/g,' ').toLowerCase().replace(/(^|\s)\S/g,function(a){return a.toUpperCase();});}
function rowHtml(values,labels){return'<tr>'+values.map(function(v,i){return '<td data-label="'+esc(labels[i])+'">'+(v==null?'':v)+'</td>';}).join('')+'</tr>';}
function val(id){var e=document.getElementById(id);return e?String(e.value||'').trim():'';}
function setValue(id,v){var e=document.getElementById(id);if(e)e.value=v||'';}
function text(id,v){var e=document.getElementById(id);if(e)e.textContent=v==null?'':v;}
function esc(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}
function escAttr(v){return esc(v).replace(/`/g,'&#096;');}
function toDateInput(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function formatDateID(v){if(!v)return'-';var s=String(v).split(' ')[0],p=s.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:s;}
function formatLongDate(d){return d.toLocaleDateString('id-ID',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});}
function formatDateTimeID(d){return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function onlyTime(v){if(!v)return'--:--';var m=String(v).match(/(\d{1,2}):(\d{2})/);return m?String(m[1]).padStart(2,'0')+':'+m[2]:String(v);}
function serverTimeDisplay(){return serverTimeData&&serverTimeData.serverNowDisplay?serverTimeData.serverNowDisplay:formatDateTimeID(new Date())+' WIB';}
function shortDuration(v){return String(v||'0 jam 0 menit').replace(' jam ','j ').replace(' menit','m');}
function distanceMeters(a,b,c,d){var R=6371000,rad=function(x){return x*Math.PI/180;},dl=rad(c-a),dn=rad(d-b),x=Math.sin(dl/2)*Math.sin(dl/2)+Math.cos(rad(a))*Math.cos(rad(c))*Math.sin(dn/2)*Math.sin(dn/2);return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function downloadText(name,content){var blob=new Blob([content],{type:'text/plain;charset=utf-8'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(function(){URL.revokeObjectURL(url);},800);}
function fileToBase64(file){return new Promise(function(res,rej){var r=new FileReader();r.onload=function(e){res(e.target.result);};r.onerror=function(){rej(new Error('Gagal membaca file'));};r.readAsDataURL(file);});}
function compressVideoFrame(v,w,q){return new Promise(function(res,rej){try{var cw=v.videoWidth||960,ch=v.videoHeight||720,ratio=Math.min(w/cw,1),nw=Math.round(cw*ratio),nh=Math.round(ch*ratio),c=document.createElement('canvas');c.width=nw;c.height=nh;c.getContext('2d').drawImage(v,0,0,nw,nh);res(c.toDataURL('image/jpeg',q||.55));}catch(e){rej(e);}});}
function compressImageFile(file,w,q){return new Promise(function(res,rej){var r=new FileReader();r.onload=function(e){var img=new Image();img.onload=function(){var ratio=Math.min(w/img.width,1),nw=Math.round(img.width*ratio),nh=Math.round(img.height*ratio),c=document.createElement('canvas');c.width=nw;c.height=nh;c.getContext('2d').drawImage(img,0,0,nw,nh);res(c.toDataURL('image/jpeg',q||.55));};img.onerror=function(){rej(new Error('File gambar tidak valid'));};img.src=e.target.result;};r.onerror=function(){rej(new Error('Gagal membaca file'));};r.readAsDataURL(file);});}
function registerSW(){if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(function(){});}
</script></body></html>
