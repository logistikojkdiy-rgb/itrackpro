function normalizeLoginResponse(res){
  if(!res) return null;
  const src=(res.data&&(res.data.user||res.data.profile||res.data.account||res.data.pengguna))||res.user||res.profile||res.account||res.data||res;
  const u=src&&src.user?src.user:(src||{});
  const user={
    USER_ID:u.USER_ID||u.userId||u.idPengguna||u['ID Pengguna']||'',
    USERNAME:u.USERNAME||u.username||u.namaPengguna||u['Nama Pengguna']||u.EMAIL||u.email||'',
    NAMA_LENGKAP:u.NAMA_LENGKAP||u.namaLengkap||u.fullName||u.nama||u['Nama Lengkap']||u.USERNAME||u.username||'',
    ROLE:u.ROLE||u.role||u.PERAN||u.peran||u['Peran']||'PESERTA',
    STATUS_AKUN:u.STATUS_AKUN||u.statusAkun||u.status||u['Status Akun']||'AKTIF',
    PHOTO_URL:u.PHOTO_URL||u.photoUrl||u['URL Foto Profil']||'',
    EMAIL:u.EMAIL||u.email||u.Email||'',
    DIVISI:u.DIVISI||u.divisi||u.Divisi||'',
    JABATAN:u.JABATAN||u.jabatan||u.Jabatan||'',
    NO_HP:u.NO_HP||u.noHp||u.nomorHp||u['Nomor HP']||'',
    TANGGAL_MULAI_MAGANG:u.TANGGAL_MULAI_MAGANG||u.tanggalMulaiMagang||u['Tanggal Mulai Magang']||'',
    TANGGAL_SELESAI_MAGANG:u.TANGGAL_SELESAI_MAGANG||u.tanggalSelesaiMagang||u['Tanggal Selesai Magang']||''
  };
  user.userId=user.USER_ID;user.username=user.USERNAME;user.namaLengkap=user.NAMA_LENGKAP;user.role=user.ROLE;user.statusAkun=user.STATUS_AKUN;
  return user;
}

function renderMyReports(rows){

      + '</div>';

  document.querySelectorAll('.edit-revision-report').forEach(b=>b.addEventListener('click',()=>openRevisionReportEditor(b.getAttribute('data-id'))));
}

function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}function fmtDate(v){if(typeof formatDateID==='function')return formatDateID(v);const p=String(v||'').substring(0,10).split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:(v||'-')}function esc(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}function escAttr(v){return esc(v).replace(/`/g,'&#096;')}function notify(t,title,msg){if(typeof toast==='function'){toast(title,msg,t);return}if(typeof showToast==='function'){showToast(t,title,msg);return}alert((title||'')+'\n'+(msg||''))}
async function callApi(action,payload){if(typeof api==='function')return await api(action,payload||{});if(typeof API_URL==='undefined')throw new Error('API_URL tidak ditemukan.');const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,payload:payload||{}})});return await r.json()}

window.viewUserWork=function(){return `<section id="view-user-work" class="view"><div class="itr-report-page"><div><div class="itr-report-card"><div class="itr-report-head"><div><h2>Laporan Kegiatan</h2><p>Isi kegiatan harian dengan rapi. Setiap kegiatan bisa dilipat setelah selesai agar form tidak membingungkan.</p></div><span id="draftStatus" class="itr-report-chip">Draft</span></div><form id="formWork"><div id="reportDateWarning" class="itr-report-warning"></div><div class="itr-report-grid2"><div class="field"><input id="workDate" type="date" placeholder=" " required><label>Tanggal Laporan</label></div><div class="field"><select id="workDivision" required><option>Internship / Magang</option><option>Administrasi</option><option>Pengawasan</option><option>Edukasi dan Perlindungan Konsumen</option><option>Umum</option></select><label>Divisi</label></div></div><div id="workItems" class="itr-activity-list"></div><button type="button" class="btn btn-secondary btn-full" id="btnAddWork">Tambah Kegiatan Lagi</button><div class="itr-max-note">Maksimal 10 kegiatan dalam satu laporan. Jika kegiatan sudah selesai diisi, tekan <b>Selesai Input</b> agar card kegiatan terlipat.</div><div style="height:12px"></div><div class="field"><textarea id="workNote" placeholder=" "></textarea><label>Catatan Peserta</label></div><div class="itr-report-actions"><button type="button" class="btn btn-secondary" id="btnSaveWorkDraft">Simpan Draft</button><button type="button" class="btn btn-red" id="btnClearDraft">Hapus Draft</button><button type="button" class="btn btn-secondary full" id="btnPreviewWorkReport">Preview Laporan</button><button type="submit" class="btn btn-primary full">Kirim Laporan</button></div></form></div><div class="itr-report-card"><div class="itr-report-head"><div><h2>Riwayat Laporan</h2><p>Status laporan yang sudah dikirim.</p></div><button type="button" class="btn btn-secondary btn-mini" id="btnMyReports">Refresh</button></div><div id="myReportRows" class="itr-history-list"><div class="empty">Belum ada laporan.</div></div></div></div><aside><div class="itr-report-card itr-side-card"><div class="itr-report-head"><div><h2>Ringkasan</h2><p>Pastikan data sudah sesuai sebelum dikirim.</p></div></div><div class="itr-summary-list"><div class="itr-summary-item"><small>Tanggal</small><b id="workSummaryDate">-</b></div><div class="itr-summary-item"><small>Kegiatan Lengkap</small><b id="workSummaryComplete">0 / 10</b></div><div class="itr-summary-item"><small>Total Durasi</small><b id="workSummaryDuration">0 jam 0 menit</b></div><div class="itr-summary-item"><small>Dokumentasi</small><b id="workSummaryPhotos">0 gambar</b></div></div><div style="height:14px"></div><button type="button" class="btn btn-secondary btn-full" id="btnUseTodayWorkDate">Gunakan Tanggal Hari Ini</button></div></aside></div><div id="workPreviewModal" class="itr-preview-modal"><div class="itr-preview-card"><div class="itr-preview-head"><div><h2>Preview Laporan</h2><p id="workPreviewSub">Cek laporan sebelum dikirim.</p></div><button type="button" class="btn btn-secondary btn-mini" id="btnCloseWorkPreview">Tutup</button></div><div id="workPreviewContent"></div><div class="itr-report-actions"><button type="button" class="btn btn-secondary" id="btnBackToEditWork">Kembali Edit</button><button type="button" class="btn btn-primary" id="btnConfirmSubmitWork">Konfirmasi Kirim</button></div></div></div></section>`};
window.addWorkItem=function(data){if(!document.getElementById('workItems'))return;if(reportItemsV3.length>=MAX_REPORT_ITEMS){notify('warning','Maksimal 10 kegiatan','Satu laporan hanya dapat berisi maksimal 10 kegiatan.');return}reportItemsV3.push(Object.assign({id:'w_'+Date.now()+'_'+Math.random().toString(16).slice(2),jamMulai:'',jamSelesai:'',uraianKegiatan:'',photoBase64:'',photoName:'',collapsed:false},data||{}));renderItems();saveDraftDebounced();updateSummary()};
function renderItems(){const box=document.getElementById('workItems');if(!box)return;box.innerHTML=reportItemsV3.map((it,i)=>{const ok=complete(it);return `<div class="itr-activity-card ${ok?'complete':''} ${it.collapsed?'collapsed':''}" data-id="${escAttr(it.id)}"><button type="button" class="itr-activity-top" data-toggle-item="${escAttr(it.id)}"><div class="itr-activity-index">${i+1}</div><div class="itr-activity-title"><b>Kegiatan ${i+1} ${ok?'<span class="itr-check">✓</span>':''}</b><span>${esc(itemSum(it))}</span></div><div class="itr-chevron">⌄</div></button><div class="itr-activity-body"><div class="itr-report-grid2"><div class="field"><input type="time" placeholder=" " value="${escAttr(it.jamMulai)}" data-work-field="jamMulai" data-id="${escAttr(it.id)}"><label>Jam Mulai</label></div><div class="field"><input type="time" placeholder=" " value="${escAttr(it.jamSelesai)}" data-work-field="jamSelesai" data-id="${escAttr(it.id)}"><label>Jam Selesai</label></div></div><div style="height:10px"></div><div class="field"><textarea placeholder=" " data-work-field="uraianKegiatan" data-id="${escAttr(it.id)}">${esc(it.uraianKegiatan)}</textarea><label>Uraian Kegiatan</label></div><div class="itr-photo-zone"><div class="itr-photo-thumb">${it.photoBase64?`<img src="${it.photoBase64}" alt="Dokumentasi">`:'Belum ada<br>gambar'}</div><div><label class="btn btn-secondary btn-full">Pilih Foto Dokumentasi<input type="file" accept="image/*" class="file-hidden" data-work-photo="${escAttr(it.id)}"></label>${it.photoBase64?'<span class="itr-attach-status ready">✓ Foto siap diupload</span>':'<span class="itr-attach-status">Belum ada gambar</span>'}<div class="itr-activity-count">Foto hanya dipreview dulu dan baru dikirim saat tombol <b>Kirim Laporan</b> ditekan.</div></div></div><div class="itr-activity-actions"><button type="button" class="itr-remove-btn" data-remove-item="${escAttr(it.id)}">Hapus Kegiatan</button><button type="button" class="itr-collapse-btn" data-done-item="${esc <script id="itrack-report-date-stable-hotfix">
(function(){
  let userReportDateMap = {};
  let isLoadingDateDraft = false;

  function getUserSafe(){
    try{
      if(typeof currentUser !== 'undefined' && currentUser) return currentUser;
    }catch(e){}

    try{
      return JSON.parse(localStorage.getItem('iTrack_user') || '{}');
    }catch(e){
      return {};
    }
  }

  function getUserIdSafe(){
    const u = getUserSafe();
    return u.USER_ID || u.userId || u.USERNAME || u.username || 'guest';
  }

  function getUsernameSafe(){
    const u = getUserSafe();
    return u.USERNAME || u.username || '';
  }

  function todayISOStable(){
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function normalizeDateStable(value){
    if(!value) return '';

    const text = String(value).trim();

    if(/^\d{4}-\d{2}-\d{2}/.test(text)){
      return text.substring(0,10);
    }

    const m = text.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
    if(m){
      return m[3] + '-' + m[2] + '-' + m[1];
    }

    const d = new Date(text);
    if(!isNaN(d.getTime())){
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    return text;
  }

  function formatDateStable(value){
    const d = normalizeDateStable(value);
    const p = d.split('-');

    if(p.length === 3){
      return p[2] + '/' + p[1] + '/' + p[0];
    }

    return value || '-';
  }

  function dateDraftKeyStable(date){
    return 'iTrack_workDraft_' + getUserIdSafe() + '_' + date;
  }

  function showReportDateMessage(type, html){
    const el = document.getElementById('reportDateWarning');
    if(!el) return;

    if(!html){
      el.classList.remove('show');
      el.innerHTML = '';
      return;
    }

    el.classList.add('show');
    el.innerHTML = html;
  }

  function setSubmitDisabled(disabled, reason){
    const form = document.getElementById('formWork');
    if(!form) return;

    const submitBtn = form.querySelector('button[type="submit"]');

    if(submitBtn){
      submitBtn.disabled = !!disabled;
      submitBtn.textContent = disabled ? 'Tanggal Sudah Ada Laporan' : 'Kirim Laporan';
    }

    const confirmBtn = document.getElementById('btnConfirmSubmitWork');
    if(confirmBtn){
      confirmBtn.disabled = !!disabled;
      confirmBtn.textContent = disabled ? 'Tanggal Sudah Ada Laporan' : 'Konfirmasi Kirim';
    }
  }

  async function callApiStable(action,payload){
    if(typeof api === 'function'){
      return await api(action,payload || {});
    }

    if(typeof API_URL === 'undefined'){
      throw new Error('API_URL tidak ditemukan.');
    }

    const res = await fetch(API_URL,{
      method:'POST',
      headers:{
        'Content-Type':'text/plain;charset=utf-8'
      },
      body:JSON.stringify({
        action:action,
        payload:payload || {}
      })
    });

    return await res.json();
  }

  async function refreshUserReportDateMap(){
    try{
      const res = await callApiStable('getMyWorkReports',{
        userId:getUserIdSafe(),
        username:getUsernameSafe()
      });

      const rows = Array.isArray(res && res.data) ? res.data : [];

      userReportDateMap = {};

      rows.forEach(function(row){
        const date = normalizeDateStable(
          row.TANGGAL ||
          row.tanggal ||
          row.tanggalLaporan ||
          ''
        );

        if(date){
          userReportDateMap[date] = row;
        }
      });

      return userReportDateMap;
    }catch(e){
      console.warn('[iTrack] Gagal memuat tanggal laporan:', e);
      userReportDateMap = {};
      return {};
    }
  }

  function checkSelectedReportDate(){
    const input = document.getElementById('workDate');
    if(!input) return;

    const selectedDate = normalizeDateStable(input.value);
    const today = todayISOStable();

    const existing = userReportDateMap[selectedDate];

    if(existing){
      const status = existing.STATUS_LAPORAN || existing.statusLaporan || '-';

      showReportDateMessage(
        'duplicate',
        '<b>Tanggal ini sudah memiliki laporan.</b><br>' +
        'Laporan tanggal ' + formatDateStable(selectedDate) + ' sudah tercatat dengan status <b>' + status + '</b>. ' +
        'Silakan pilih tanggal lain atau hubungi admin jika perlu koreksi.'
      );

      setSubmitDisabled(true,'Tanggal sudah ada laporan.');
      return;
    }

    if(selectedDate < today){
      showReportDateMessage(
        'backdate',
        '<b>Laporan backdate.</b><br>' +
        'Laporan tanggal ' + formatDateStable(selectedDate) + ' tetap dapat dikirim dan akan menunggu validasi admin.'
      );

      setSubmitDisabled(false);
      return;
    }

    if(selectedDate > today){
      showReportDateMessage(
        'future',
        '<b>Tanggal setelah hari ini.</b><br>' +
        'Pastikan tanggal laporan sudah benar. Laporan akan menunggu validasi admin.'
      );

      setSubmitDisabled(false);
      return;
    }

    showReportDateMessage('', '');
    setSubmitDisabled(false);
  }

  function loadDraftForExactDateOnly(date){
    const raw = localStorage.getItem(dateDraftKeyStable(date));

    if(!raw){
      if(window.reportItemsV3 && Array.isArray(window.reportItemsV3)){
        // tidak dipakai jika variabel scoped, fallback diam saja
      }
      return null;
    }

    try{
      return JSON.parse(raw);
    }catch(e){
      return null;
    }
  }

  function resetReportFormForDate(date){
    const note = document.getElementById('workNote');
    const division = document.getElementById('workDivision');

    if(note) note.value = '';

    if(division){
      const u = getUserSafe();
      division.value = u.DIVISI || u.divisi || 'Internship / Magang';
    }

    /*
     * Untuk item kegiatan, gunakan fungsi refresh patch jika ada.
     * Kalau tidak ada, biarkan struktur lama yang menangani.
     */
    if(typeof window.iTrackReportExportFullUpdateRefresh === 'function'){
      // Jangan dipanggil di sini supaya tanggal tidak ikut direset ulang.
    }
  }

  function loadDateSpecificDraftWithoutChangingDate(){
    const input = document.getElementById('workDate');
    if(!input) return;

    const date = normalizeDateStable(input.value);
    const data = loadDraftForExactDateOnly(date);

    if(!data){
      resetReportFormForDate(date);
      return;
    }

    const note = document.getElementById('workNote');
    const division = document.getElementById('workDivision');

    if(note) note.value = data.note || data.catatanUser || '';
    if(division) division.value = data.division || data.divisi || division.value;

    /*
     * Jika patch laporan V3 punya fungsi loadWorkDraft lama,
     * jangan pakai fallback global karena itu yang membuat tanggal mental.
     * Item kegiatan akan tetap dari state saat ini / reload manual.
     */
  }

  function bindStableDateInput(){
    const input = document.getElementById('workDate');
    if(!input || input.getAttribute('data-stable-date-bound')) return;

    input.setAttribute('data-stable-date-bound','1');

    input.addEventListener('change',function(){
      if(isLoadingDateDraft) return;

      const selected = normalizeDateStable(input.value);
      input.value = selected;

      loadDateSpecificDraftWithoutChangingDate();
      checkSelectedReportDate();
    });
  }

  async function initStableReportDate(){
    const input = document.getElementById('workDate');
    if(!input) return;

    if(!input.value){
      input.value = todayISOStable();
    }else{
      input.value = normalizeDateStable(input.value);
    }

    bindStableDateInput();

    await refreshUserReportDateMap();

    checkSelectedReportDate();
  }

  /*
   * Override submit agar tanggal yang sudah ada laporan tidak terkirim lagi dari UI.
   */
  const oldSubmit = window.submitWorkReportForm;

  window.submitWorkReportForm = async function(e){
    if(e && e.preventDefault) e.preventDefault();

    const input = document.getElementById('workDate');
    const selectedDate = normalizeDateStable(input && input.value);

    if(userReportDateMap[selectedDate]){
      checkSelectedReportDate();

      if(typeof showToast === 'function'){
        showToast('warning','Tanggal sudah ada laporan','Silakan pilih tanggal lain atau hubungi admin.');
      }else{
        alert('Tanggal ini sudah ada laporan. Silakan pilih tanggal lain atau hubungi admin.');
      }

      return;
    }

    if(typeof oldSubmit === 'function'){
      return await oldSubmit(e);
    }
  };

  /*
   * Refresh history lalu map tanggal setelah submit / refresh.
   */
  const oldRenderMyReports = window.renderMyReports;

  window.renderMyReports = function(rows){
    if(typeof oldRenderMyReports === 'function'){
      oldRenderMyReports(rows);
    }

    userReportDateMap = {};

    (Array.isArray(rows) ? rows : []).forEach(function(row){
      const date = normalizeDateStable(row.TANGGAL || row.tanggal || row.tanggalLaporan || '');

      if(date){
        userReportDateMap[date] = row;
      }
    });

    checkSelectedReportDate();

  /*
   * Init saat buka menu laporan.
   */
  const oldOpenView = window.openView;

  if(typeof oldOpenView === 'function'){
    window.openView = function(id){
      oldOpenView(id);

      if(id === 'user-work'){
        setTimeout(initStableReportDate,300);
      }
    };
  }

  document.addEventListener('DOMContentLoaded',function(){
    setTimeout(initStableReportDate,1000);
  });

  window.iTrackReportDateStableRefresh = initStableReportDate;
})();
</script>
<script id="itrack-report-date-force-stable-v2">
(function(){
  let reportDateMap = {};
  let stableBound = false;

  function getUser(){
    try{
      if(typeof currentUser !== 'undefined' && currentUser) return currentUser;
    }catch(e){}

    try{
      return JSON.parse(localStorage.getItem('iTrack_user') || '{}');
    }catch(e){
      return {};
    }
  }

  function userId(){
    const u = getUser();
    return u.USER_ID || u.userId || u.USERNAME || u.username || 'guest';
  }

  function username(){
    const u = getUser();
    return u.USERNAME || u.username || '';
  }

  function todayISO(){
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function normalizeDate(v){
    if(!v) return '';

    const text = String(v).trim();

    if(/^\d{4}-\d{2}-\d{2}/.test(text)){
      return text.substring(0,10);
    }

    const m = text.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
    if(m){
      return m[3] + '-' + m[2] + '-' + m[1];
    }

    const d = new Date(text);
    if(!isNaN(d.getTime())){
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    return text;
  }

  function formatDate(v){
    const d = normalizeDate(v);
    const p = d.split('-');

    if(p.length === 3){
      return p[2] + '/' + p[1] + '/' + p[0];
    }

    return v || '-';
  }

  async function callApiSafe(action,payload){
    if(typeof api === 'function'){
      return await api(action,payload || {});
    }

    if(typeof API_URL === 'undefined'){
      throw new Error('API_URL tidak ditemukan.');
    }

    const res = await fetch(API_URL,{
      method:'POST',
      headers:{
        'Content-Type':'text/plain;charset=utf-8'
      },
      body:JSON.stringify({
        action:action,
        payload:payload || {}
      })
    });

    return await res.json();
  }

  async function loadReportDateMap(){
    try{
      const res = await callApiSafe('getMyWorkReports',{
        userId:userId(),
        username:username()
      });

      const rows = Array.isArray(res && res.data) ? res.data : [];

      reportDateMap = {};

      rows.forEach(function(row){
        const d = normalizeDate(
          row.TANGGAL ||
          row.tanggal ||
          row.tanggalLaporan ||
          ''
        );

        if(d){
          reportDateMap[d] = row;
        }
      });
    }catch(e){
      console.warn('[iTrack] Gagal memuat map tanggal laporan:', e);
      reportDateMap = {};
    }
  }

  function showWarning(html){
    const el = document.getElementById('reportDateWarning');
    if(!el) return;

    if(!html){
      el.classList.remove('show');
      el.innerHTML = '';
      return;
    }

    el.classList.add('show');
    el.innerHTML = html;
  }

  function setSubmitDisabled(disabled){
    const form = document.getElementById('formWork');

    if(form){
      const btn = form.querySelector('button[type="submit"]');
      if(btn){
        btn.disabled = !!disabled;
        btn.textContent = disabled ? 'Tanggal Sudah Ada Laporan' : 'Kirim Laporan';
      }
    }

    const confirm = document.getElementById('btnConfirmSubmitWork');

    if(confirm){
      confirm.disabled = !!disabled;
      confirm.textContent = disabled ? 'Tanggal Sudah Ada Laporan' : 'Konfirmasi Kirim';
    }
  }

  function checkDate(){
    const input = document.getElementById('workDate');
    if(!input) return;

    const selected = normalizeDate(input.value);
    const today = todayISO();

    input.value = selected;

    const existing = reportDateMap[selected];

    if(existing){
      const status = existing.STATUS_LAPORAN || existing.statusLaporan || '-';

      showWarning(
        '<b>Tanggal ini sudah memiliki laporan.</b><br>' +
        'Laporan tanggal ' + formatDate(selected) +
        ' sudah tercatat dengan status <b>' + status + '</b>. ' +
        'Silakan pilih tanggal lain atau hubungi admin jika perlu koreksi.'
      );

      setSubmitDisabled(true);
      return;
    }

    if(selected < today){
      showWarning(
        '<b>Laporan backdate.</b><br>' +
        'Laporan tanggal ' + formatDate(selected) +
        ' tetap dapat dikirim dan akan menunggu validasi admin.'
      );

      setSubmitDisabled(false);
      return;
    }

    if(selected > today){
      showWarning(
        '<b>Tanggal setelah hari ini.</b><br>' +
        'Pastikan tanggal laporan sudah benar. Laporan akan menunggu validasi admin.'
      );

      setSubmitDisabled(false);
      return;
    }

    showWarning('');
    setSubmitDisabled(false);
  }

  /*
   * Ini bagian penting:
   * Menghapus handler tanggal lama yang membuat tanggal balik ke draft global.
   */
  function forceRebindDateInput(){
    const oldInput = document.getElementById('workDate');
    if(!oldInput) return;

    if(oldInput.getAttribute('data-force-stable-date') === '1') return;

    const currentValue = normalizeDate(oldInput.value || todayISO());

    const newInput = oldInput.cloneNode(true);
    newInput.value = currentValue;
    newInput.setAttribute('data-force-stable-date','1');

    oldInput.parentNode.replaceChild(newInput, oldInput);

    newInput.addEventListener('input',function(){
      /*
       * Jangan load draft global.
       * Jangan set tanggal dari draft.
       * Hanya validasi tanggal yang dipilih user.
       */
      checkDate();
    });

    newInput.addEventListener('change',function(){
      checkDate();
    });
  }

  /*
   * Override loadWorkDraft agar tidak pernah menimpa tanggal pilihan user.
   */
  const oldLoadWorkDraft = window.loadWorkDraft;

  window.loadWorkDraft = function(){
    const input = document.getElementById('workDate');
    const selectedBefore = input ? normalizeDate(input.value || todayISO()) : todayISO();

    if(typeof oldLoadWorkDraft === 'function'){
      oldLoadWorkDraft();
    }

    const inputAfter = document.getElementById('workDate');
    if(inputAfter){
      inputAfter.value = selectedBefore;
    }

    checkDate();
  };

  /*
   * Override submit: kalau tanggal sudah ada laporan, jangan kirim.
   */
  const oldSubmit = window.submitWorkReportForm;

  window.submitWorkReportForm = async function(e){
    if(e && e.preventDefault) e.preventDefault();

    const input = document.getElementById('workDate');
    const selected = normalizeDate(input && input.value);

    if(reportDateMap[selected]){
      checkDate();

      if(typeof showToast === 'function'){
        showToast('warning','Tanggal sudah ada laporan','Silakan pilih tanggal lain atau hubungi admin.');
      }else{
        alert('Tanggal ini sudah ada laporan. Silakan pilih tanggal lain atau hubungi admin.');
      }

      return;
    }

    if(typeof oldSubmit === 'function'){
      return await oldSubmit(e);
    }
  };

  /*
   * Setelah riwayat laporan dirender, update map tanggal.
   */
  const oldRender = window.renderMyReports;

  window.renderMyReports = function(rows){
    if(typeof oldRender === 'function'){
      oldRender(rows);
    }

    reportDateMap = {};

    (Array.isArray(rows) ? rows : []).forEach(function(row){
      const d = normalizeDate(
        row.TANGGAL ||
        row.tanggal ||
        row.tanggalLaporan ||
        ''
      );

      if(d){
        reportDateMap[d] = row;
      }
    });

    checkDate();
  };

  async function init(){
    const input = document.getElementById('workDate');
    if(!input) return;

    if(!input.value){
      input.value = todayISO();
    }

    forceRebindDateInput();

    await loadReportDateMap();

    checkDate();

    stableBound = true;
  }

  /*
   * Re-init saat masuk halaman laporan.
   */
  const oldOpenView = window.openView;

  if(typeof oldOpenView === 'function'){
    window.openView = function(id){
      oldOpenView(id);

      if(id === 'user-work'){
        setTimeout(init,300);
        setTimeout(init,900);
      }
    };
  }

  document.addEventListener('DOMContentLoaded',function(){
    setTimeout(init,800);
    setTimeout(init,1800);
  });

  window.iTrackForceStableReportDate = init;
})();
</script>

<script id="itrack-pretty-report-detail-script">
(function(){
  var EXEC_URL = 'https://script.google.com/macros/s/AKfycbxJQ-MUX4HCH2Px3zWeC7a1mJ1MTJ03o_CWoPF160kfIatq8y3SiHtzBDlTvj8DpcXJUA/exec';
  var reportCache = [];
  var reportCacheAt = 0;

  function esc(value){
    return String(value == null ? '' : value)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#039;');
  }

  function attr(value){
    return esc(value).replace(/`/g,'&#096;');
  }

  function any(row, keys, fallback){
    row = row || {};

    for(var i = 0; i < keys.length; i++){
      var key = keys[i];

      if(row[key] !== undefined && row[key] !== null && row[key] !== ''){
        return row[key];
      }
    }

    return fallback === undefined ? '' : fallback;
  }

  function rowsOf(res){
    if(!res) return [];
    if(Array.isArray(res)) return res;
    if(Array.isArray(res.data)) return res.data;

    var keys = ['rows','items','data','reports','laporan','workReports'];

    for(var i = 0; i < keys.length; i++){
      if(res.data && Array.isArray(res.data[keys[i]])){
        return res.data[keys[i]];
      }
    }

    return [];
  }

  async function apiCall(action, payload){
    payload = payload || {};

    if(typeof window.api === 'function'){
      try{
        return await window.api(action, payload);
      }catch(e){
        console.warn('[Pretty Report Detail] api lama gagal, fallback direct:', e.message);
      }
    }

    var res = await fetch(EXEC_URL,{
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({
        action:action,
        payload:payload
      })
    });

    var text = await res.text();

    if(!text) throw new Error('Response API kosong.');

    try{
      return JSON.parse(text);
    }catch(error){
      console.error('[Pretty Report Detail] Response bukan JSON:', text);
      throw new Error('Response API bukan JSON.');
    }
  }

  function popup(type,title,message){
    if(typeof window.toast === 'function'){
      window.toast(title || 'Info', message || '', type || 'info');
      return;
    }

    if(typeof window.showToast === 'function'){
      window.showToast(type || 'info', title || 'Info', message || '');
      return;
    }

    alert((title || 'Info') + '\n' + (message || ''));
  }

  function statusBadge(status){
    status = String(status || '-');
    var upper = status.toUpperCase();
    var cls = '';

    if(['DISETUJUI','VALID','SELESAI','AKTIF'].indexOf(upper) !== -1) cls = 'good';
    if(['MENUNGGU','REVISI','PERLU_REVIEW','TERLAMBAT'].indexOf(upper) !== -1) cls = 'warn';
    if(['DITOLAK','INVALID','NONAKTIF','DIBLOKIR'].indexOf(upper) !== -1) cls = 'bad';

    return '<span class="itp-badge ' + cls + '">' + esc(status) + '</span>';
  }

  function normalizeDate(value){
    if(!value) return '-';

    var text = String(value);

    if(/^\d{4}-\d{2}-\d{2}/.test(text)){
      var p = text.substring(0,10).split('-');
      return p[2] + '/' + p[1] + '/' + p[0];
    }

    return text;
  }

  function normalizeTime(value){
    value = String(value || '');
    var m = value.match(/(\d{1,2}):(\d{2})/);

    if(m){
      return String(m[1]).padStart(2,'0') + ':' + m[2];
    }

    return value || '-';
  }

  function ensureModal(){
    if(document.getElementById('itpReportModal')) return;

    var el = document.createElement('div');
    el.id = 'itpReportModal';
    el.className = 'itp-modal-bg';
    el.innerHTML = ''
      + '<div class="itp-modal">'
      + '<div class="itp-head">'
      + '<div>'
      + '<h2 id="itpReportTitle">Detail Laporan Kerja</h2>'
      + '<p id="itpReportSub">Ringkasan dan detail kegiatan peserta.</p>'
      + '</div>'
      + '<button type="button" class="itp-close" id="itpReportClose">Tutup</button>'
      + '</div>'
      + '<div id="itpReportBody"></div>'
      + '</div>';

    document.body.appendChild(el);

    document.getElementById('itpReportClose').onclick = function(){
      el.classList.remove('show');
    };
  }

  function showModal(title, sub, html){
    ensureModal();

    document.getElementById('itpReportTitle').textContent = title || 'Detail Laporan Kerja';
    document.getElementById('itpReportSub').textContent = sub || '';
    document.getElementById('itpReportBody').innerHTML = html || '';
    document.getElementById('itpReportModal').classList.add('show');
  }

  function getReportId(row){
    return any(row, [
      'REPORT_ID',
      'reportId',
      'idLaporan',
      'ID Laporan',
      'ID_LAPORAN',
      'Report ID',
      'ID',
      'id'
    ]);
  }

  async function fetchReportList(force){
    if(!force && reportCache.length && Date.now() - reportCacheAt < 15000){
      return reportCache;
    }

    var res;

    try{
      res = await apiCall('getWorkReportsForAdmin',{});
    }catch(e){
      res = await apiCall('getFilteredReports',{});
    }

    reportCache = rowsOf(res);
    reportCacheAt = Date.now();

    return reportCache;
  }

  function visibleReportRows(){
    var selectors = [
      '#adminReportRows tr',
      '#workReportRows tr',
      '#reportRows tr',
      'table[data-admin-report] tbody tr'
    ];

    var rows = [];

    selectors.forEach(function(selector){
      document.querySelectorAll(selector).forEach(function(row){
        if(row && row.innerText && row.innerText.trim() && !row.querySelector('.empty')){
          rows.push(row);
        }
      });
    });

    return rows;
  }

  function indexOfRow(row){
    var rows = visibleReportRows();

    for(var i = 0; i < rows.length; i++){
      if(rows[i] === row) return i;
    }

    return -1;
  }

  async function resolveReportIdFromButton(button){
    var id =
      button.getAttribute('data-id') ||
      button.getAttribute('data-report-id') ||
      '';

    if(id) return id;

    var row = button.closest('tr');

    if(!row) return '';

    id =
      row.getAttribute('data-report-id') ||
      row.getAttribute('data-id-laporan') ||
      row.getAttribute('data-id') ||
      '';

    if(id) return id;

    var index = indexOfRow(row);

    if(index < 0) return '';

    var reports = await fetchReportList(false);
    var report = reports[index] || {};

    return getReportId(report);
  }

  async function loadReportDetail(reportId){
    if(!reportId){
      throw new Error('ID Laporan tidak ditemukan.');
    }

    var res = await apiCall('adminGetWorkReportFullDetail',{
      reportId:reportId,
      idLaporan:reportId
    });

    if(res && res.success === false){
      throw new Error(res.message || 'Detail laporan gagal dimuat.');
    }

    return res.data || res;
  }

  function renderInfo(label, value){
    return ''
      + '<div class="itp-info">'
      + '<small>' + esc(label) + '</small>'
      + '<b>' + esc(value || '-') + '</b>'
      + '</div>';
  }

  function renderItem(item, index){
    var itemId = any(item, ['ID Kegiatan','ITEM_ID','itemId','idKegiatan','ID_KEGIATAN'], '-');
    var start = normalizeTime(any(item, ['Jam Mulai','JAM_MULAI','jamMulai','start']));
    var end = normalizeTime(any(item, ['Jam Selesai','JAM_SELESAI','jamSelesai','end']));
    var duration = any(item, ['Durasi','DURASI','durasi'], '-');
    var desc = any(item, ['Uraian Kegiatan','URAIAN_KEGIATAN','uraianKegiatan','uraian','deskripsi'], '-');
    var doc = any(item, ['URL Dokumentasi','DOKUMENTASI_URL','dokumentasiUrl','urlDokumentasi','Dokumentasi'], '');

    return ''
      + '<div class="itp-item">'
      + '<div class="itp-item-head">'
      + '<div>'
      + '<b>Kegiatan ' + (index + 1) + '</b><br>'
      + '<small>' + esc(start) + ' - ' + esc(end) + ' · ' + esc(duration) + '</small>'
      + '</div>'
      + '<span class="itp-badge">' + esc(itemId) + '</span>'
      + '</div>'
      + '<div class="itp-desc">' + esc(desc) + '</div>'
      + (doc
        ? '<div class="itp-doc"><a href="' + attr(doc) + '" target="_blank">📎 Buka Dokumentasi</a></div>'
        : '')
      + '</div>';
  }

  function renderPrettyReport(data, reportId){
    var report = data.report || data.header || data.laporan || data;
    var items = data.items || data.details || data.kegiatan || data.activities || [];

    if(!Array.isArray(items)) items = [];

    var nama = any(report, ['Nama Lengkap','NAMA_LENGKAP','namaLengkap','nama'], '-');
    var username = any(report, ['Nama Pengguna','USERNAME','username'], '-');
    var divisi = any(report, ['Divisi','DIVISI','divisi'], '-');
    var tanggal = normalizeDate(any(report, ['Tanggal','TANGGAL','tanggal','date'], '-'));
    var status = any(report, ['Status Laporan','STATUS_LAPORAN','statusLaporan','status'], '-');
    var totalKegiatan = any(report, ['Total Kegiatan','TOTAL_KEGIATAN','totalKegiatan'], items.length);
    var totalDurasi = any(report, ['Total Durasi','TOTAL_DURASI','totalDurasi'], '-');
    var catatanUser = any(report, ['Catatan Peserta','CATATAN_PESERTA','catatanPeserta','Catatan User'], '-');
    var catatanAdmin = any(report, ['Catatan Admin','CATATAN_ADMIN','catatanAdmin'], '-');

    var html = '';

    html += '<div class="itp-summary">';
    html += renderInfo('Nama Peserta', nama);
    html += renderInfo('Username', username);
    html += renderInfo('Tanggal', tanggal);
    html += '<div class="itp-info"><small>Status</small><b>' + statusBadge(status) + '</b></div>';
    html += renderInfo('Divisi', divisi);
    html += renderInfo('Total Kegiatan', totalKegiatan);
    html += renderInfo('Total Durasi', totalDurasi);
    html += renderInfo('ID Laporan', reportId || getReportId(report) || '-');
    html += '</div>';

    html += '<div class="itp-section">';
    html += '<h3>Catatan</h3>';
    html += '<div class="itp-summary" style="grid-template-columns:1fr 1fr">';
    html += renderInfo('Catatan Peserta', catatanUser);
    html += renderInfo('Catatan Admin', catatanAdmin);
    html += '</div>';
    html += '</div>';

    html += '<div class="itp-section">';
    html += '<h3>Detail Kegiatan</h3>';

    if(items.length){
      html += items.map(function(item, index){
        return renderItem(item, index);
      }).join('');
    }else{
      html += '<div class="itp-empty">Belum ada detail kegiatan pada laporan ini.</div>';
    }

    html += '</div>';

    html += '<div class="itp-actions">';
    html += '<button type="button" class="btn btn-green" data-itp-status="DISETUJUI" data-itp-report-id="' + attr(reportId) + '">Setujui</button>';
    html += '<button type="button" class="btn btn-orange" data-itp-status="REVISI" data-itp-report-id="' + attr(reportId) + '">Revisi</button>';
    html += '<button type="button" class="btn btn-red" data-itp-status="DITOLAK" data-itp-report-id="' + attr(reportId) + '">Tolak</button>';
    html += '</div>';

    return html;
  }

  async function updateReportStatus(reportId, status){
    var note = '';

    if(status === 'DISETUJUI'){
      note = 'Disetujui admin.';
    }else{
      note = prompt(
        status === 'REVISI'
          ? 'Catatan revisi laporan:'
          : 'Catatan penolakan laporan:',
        ''
      );

      if(note === null) return;
    }

    var currentUser = {};

    try{
      currentUser = window.currentUser || JSON.parse(localStorage.getItem('iTrack_user') || '{}');
    }catch(e){}

    var payload = {
      reportId:reportId,
      idLaporan:reportId,
      statusLaporan:status,
      status:status,
      catatanAdmin:note,
      catatan:note,
      validatedBy:
        currentUser.NAMA_LENGKAP ||
        currentUser.namaLengkap ||
        currentUser.USERNAME ||
        currentUser.username ||
        'Admin'
    };

    var res;

    try{
      res = await apiCall('adminUpdateWorkReportStatus', payload);
    }catch(e){
      res = await apiCall('validateWorkReport', payload);
    }

    if(res && res.success === false){
      throw new Error(res.message || 'Status laporan gagal diperbarui.');
    }

    popup('success','Laporan diperbarui','Status laporan berhasil diubah menjadi ' + status + '.');

    document.getElementById('itpReportModal').classList.remove('show');

    if(typeof window.loadAdminReports === 'function'){
      window.loadAdminReports();
    }
  }

  /*
   * Tangkap klik tombol Detail laporan, lalu tampilkan modal rapi.
   * Ini mencegah modal lama yang menampilkan JSON mentah.
   */
  document.addEventListener('click', function(event){
    var button = event.target.closest('button');

    if(!button) return;

    var text = String(button.innerText || button.textContent || '').trim().toLowerCase();
    var isDetailButton =
      button.classList.contains('itx-report-detail') ||
      button.classList.contains('report-detail') ||
      button.classList.contains('btn-report-detail') ||
      text === 'detail' ||
      text.indexOf('detail') !== -1;

    if(!isDetailButton) return;

    var row = button.closest('tr');
    var tableText = row && row.closest('table')
      ? String(row.closest('table').innerText || '').toLowerCase()
      : '';

    /*
     * Pastikan yang dicegat hanya detail laporan, bukan detail absensi/peserta.
     */
    if(
      tableText.indexOf('kegiatan') === -1 &&
      tableText.indexOf('durasi') === -1 &&
      tableText.indexOf('laporan') === -1
    ){
      return;
    }

    event.preventDefault();
    event.stopPropagation();
    event.stopImmediatePropagation();

    (async function(){
      try{
        var reportId = await resolveReportIdFromButton(button);

        if(!reportId){
          popup(
            'error',
            'ID Laporan tidak ditemukan',
            'Data laporan belum membawa ID. Pastikan backend mengirim REPORT_ID / ID Laporan.'
          );
          return;
        }

        var data = await loadReportDetail(reportId);
        var html = renderPrettyReport(data, reportId);

        showModal(
          'Detail Laporan Kerja',
          'Ringkasan laporan, detail kegiatan, dan aksi validasi admin.',
          html
        );
      }catch(error){
        popup('error','Gagal memuat detail laporan',error.message);
      }
    })();

  }, true);

  /*
   * Aksi tombol Setujui/Revisi/Tolak dalam modal rapi.
   */
  document.addEventListener('click', function(event){
    var button = event.target.closest('[data-itp-status]');

    if(!button) return;

    event.preventDefault();
    event.stopPropagation();

    var reportId = button.getAttribute('data-itp-report-id');
    var status = button.getAttribute('data-itp-status');

    updateReportStatus(reportId, status).catch(function(error){
      popup('error','Aksi laporan gagal',error.message);
    });
  });

})();
</script>

<script id="itrack-pretty-admin-detail-v2-script">
(function(){
  var EXEC_URL = 'https://script.google.com/macros/s/AKfycbxJQ-MUX4HCH2Px3zWeC7a1mJ1MTJ03o_CWoPF160kfIatq8y3SiHtzBDlTvj8DpcXJUA/exec';

  function esc(value){
    return String(value == null ? '' : value)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#039;');
  }

  function attr(value){
    return esc(value).replace(/`/g,'&#096;');
  }

  function any(row, keys, fallback){
    row = row || {};
    keys = keys || [];

    for(var i = 0; i < keys.length; i++){
      var key = keys[i];
      if(row[key] !== undefined && row[key] !== null && row[key] !== ''){
        return row[key];
      }
    }

    return fallback === undefined ? '' : fallback;
  }

  async function apiCall(action, payload){
    payload = payload || {};

    if(typeof window.api === 'function'){
      try{
        return await window.api(action, payload);
      }catch(e){
        console.warn('[Pretty Admin Detail] api lama gagal, fallback direct:', e.message);
      }
    }

    var res = await fetch(EXEC_URL,{
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({
        action:action,
        payload:payload
      })
    });

    var text = await res.text();
    if(!text) throw new Error('Response API kosong.');

    try{
      return JSON.parse(text);
    }catch(error){
      console.error('[Pretty Admin Detail] Response bukan JSON:', text);
      throw new Error('Response API bukan JSON.');
    }
  }

  function popup(type,title,message){
    if(typeof window.toast === 'function'){
      window.toast(title || 'Info', message || '', type || 'info');
      return;
    }

    if(typeof window.showToast === 'function'){
      window.showToast(type || 'info', title || 'Info', message || '');
      return;
    }

    alert((title || 'Info') + '\n' + (message || ''));
  }

  function badge(status){
    status = String(status || '-');
    var upper = status.toUpperCase();
    var cls = '';

    if(['DISETUJUI','VALID','HADIR','SELESAI','AKTIF','TEPAT WAKTU'].indexOf(upper) !== -1) cls = 'good';
    if(['MENUNGGU','REVISI','PERLU_REVIEW','TERLAMBAT','LUAR_RADIUS'].indexOf(upper) !== -1) cls = 'warn';
    if(['DITOLAK','INVALID','NONAKTIF','DIBLOKIR','ALPHA'].indexOf(upper) !== -1) cls = 'bad';

    return '<span class="itp2-badge ' + cls + '">' + esc(status) + '</span>';
  }

  function normalizeDate(value){
    if(!value) return '-';
    var text = String(value);

    if(/^\d{4}-\d{2}-\d{2}/.test(text)){
      var p = text.substring(0,10).split('-');
      return p[2] + '/' + p[1] + '/' + p[0];
    }

    return text;
  }

  function normalizeTime(value){
    value = String(value || '');
    var m = value.match(/(\d{1,2}):(\d{2})/);

    if(m){
      return String(m[1]).padStart(2,'0') + ':' + m[2];
    }

    return value || '-';
  }

  function toMinutes(timeText){
    var m = String(timeText || '').match(/(\d{1,2}):(\d{2})/);
    if(!m) return null;
    return parseInt(m[1],10) * 60 + parseInt(m[2],10);
  }

  function lateInfo(att){
    var status = String(any(att, [
      'Status Kehadiran',
      'STATUS_KEHADIRAN',
      'statusKehadiran',
      'status'
    ], '')).toUpperCase();

    if(status.indexOf('TERLAMBAT') !== -1){
      return {
        text:'Terlambat',
        detail:'Status kehadiran tercatat terlambat.',
        className:'warn'
      };
    }

    var jamMasuk = normalizeTime(any(att, [
      'Jam Masuk',
      'JAM_MASUK',
      'jamMasuk',
      'checkIn'
    ], ''));

    var masukMin = toMinutes(jamMasuk);
    var batasMin = 8 * 60;

    if(masukMin !== null && masukMin > batasMin){
      return {
        text:'Terlambat',
        detail:'Jam masuk melewati batas 08:00.',
        className:'warn'
      };
    }

    if(masukMin !== null){
      return {
        text:'Tepat waktu',
        detail:'Jam masuk tidak melewati batas 08:00.',
        className:'good'
      };
    }

    return {
      text:'Belum diketahui',
      detail:'Jam masuk belum tersedia.',
      className:''
    };
  }

  function radiusInfo(att){
    var distance = any(att, [
      'Jarak Meter',
      'JARAK_METER',
      'distanceMeter',
      'jarakMeter',
      'Jarak Masuk',
      'jarakMasuk'
    ], '');

    var radius = any(att, [
      'Radius Kantor',
      'RADIUS_KANTOR',
      'officeRadius',
      'radius'
    ], 100);

    var numDistance = parseFloat(String(distance).replace(/[^\d.]/g,''));

    if(!isNaN(numDistance)){
      if(numDistance <= Number(radius || 100)){
        return {
          text:'Dalam radius',
          detail:Math.round(numDistance) + ' meter dari kantor.',
          className:'good'
        };
      }

      return {
        text:'Luar radius',
        detail:Math.round(numDistance) + ' meter dari kantor.',
        className:'warn'
      };
    }

    return {
      text:'Belum diketahui',
      detail:'Data jarak tidak tersedia.',
      className:''
    };
  }

  function normalizeDriveImage(url){
    url = String(url || '').trim();

    if(!url) return '';

    var m1 = url.match(/drive\.google\.com\/file\/d\/([^/]+)/);
    if(m1 && m1[1]){
      return 'https://drive.google.com/uc?export=view&id=' + m1[1];
    }

    var m2 = url.match(/[?&]id=([^&]+)/);
    if(url.indexOf('drive.google.com') !== -1 && m2 && m2[1]){
      return 'https://drive.google.com/uc?export=view&id=' + m2[1];
    }

    return url;
  }

  function mapUrl(lat, lng, fallback){
    if(lat && lng){
      return 'https://www.google.com/maps?q=' + encodeURIComponent(lat + ',' + lng);
    }

    return fallback || '';
  }

  async function loadAttendanceDetail(attendanceId){

      attendanceId:attendanceId
    });

    if(res && res.success === false){
      throw new Error(res.message || 'Detail absensi gagal dimuat.');

    return res.data || res;

    var res = await apiCall('adminGetWorkReportFullDetail',{
      reportId:reportId,
      idLaporan:reportId
    });

    if(res && res.success === false){
      throw new Error(res.message || 'Detail laporan gagal dimuat.');

  function getIdFromButton(button, type){
    var id = '';

    if(type === 'attendance'){
      id =
        button.getAttribute('data-id') ||
        button.getAttribute('data-attendance-id') ||
        button.getAttribute('data-id-absensi') ||
        '';
    }

    if(type === 'report'){
      id =
        button.getAttribute('data-id') ||
        button.getAttribute('data-report-id') ||
        button.getAttribute('data-id-laporan') ||
        '';
    }

    if(id) return id;

    var row = button.closest('tr');

    if(row){
      if(type === 'attendance'){
        id =
          row.getAttribute('data-attendance-id') ||
          row.getAttribute('data-id-absensi') ||
          row.getAttribute('data-id') ||
          '';
      }

      if(type === 'report'){
        id =
          row.getAttribute('data-report-id') ||
          row.getAttribute('data-id-laporan') ||
          row.getAttribute('data-id') ||
          '';
      }
    }

    return id;

  function isDetailButton(button){
    if(!button) return false;

    var text = String(button.innerText || button.textContent || '').trim().toLowerCase();

    return (
      button.classList.contains('itx-att-detail') ||
      button.classList.contains('itx-report-detail') ||
      button.classList.contains('att-detail') ||
      button.classList.contains('report-detail') ||
      text === 'detail' ||
      text.indexOf('detail') !== -1 ||
      text.indexOf('lihat') !== -1
    );
  }

  function detectDetailType(button){
    var row = button.closest('tr');
    var table = row && row.closest('table');
    var text = table ? String(table.innerText || '').toLowerCase() : '';

    if(
      button.classList.contains('itx-att-detail') ||
      text.indexOf('masuk') !== -1 ||
      text.indexOf('pulang') !== -1 ||
      text.indexOf('maps') !== -1
    ){
      return 'attendance';
    }

    if(
      button.classList.contains('itx-report-detail') ||
      text.indexOf('kegiatan') !== -1 ||
      text.indexOf('durasi') !== -1 ||
      text.indexOf('laporan') !== -1
    ){
      return 'report';
    }

    return '';
  }

  /*
   * Override fungsi detail dari patch sebelumnya kalau ada.
   */
  window.itp2OpenAttendanceDetail = async function(attendanceId){
    try{
      var data = await loadAttendanceDetail(attendanceId);
      var html = renderAttendanceDetail(data, attendanceId);

      showModal(
        'Detail Absensi',
        'Informasi absensi, foto, lokasi, status ketepatan waktu, dan validasi.',
        html
      );
    }catch(error){
      popup('error','Gagal memuat detail absensi',error.message);
    }
  };

  window.itp2OpenReportDetail = async function(reportId){
    try{
      var data = await loadReportDetail(reportId);
      var html = renderReportDetail(data, reportId);

      showModal(
        'Detail Laporan Kerja',
        'Ringkasan laporan, detail kegiatan, dokumentasi, dan aksi validasi admin.',
        html
      );
    }catch(error){
      popup('error','Gagal memuat detail laporan',error.message);
    }
  };

  /*
   * Tangkap semua klik Detail sebelum modal JSON lama muncul.
   */
  document.addEventListener('click', function(event){
    var button = event.target.closest('button');

    if(!button) return;
    if(!isDetailButton(button)) return;

    var type = detectDetailType(button);

    if(!type) return;

    event.preventDefault();
    event.stopPropagation();
    event.stopImmediatePropagation();

    var id = getIdFromButton(button, type);

    if(!id){
      popup(
        'error',
        type === 'attendance' ? 'ID Absensi tidak ditemukan' : 'ID Laporan tidak ditemukan',
        'Tombol detail belum membawa ID. Pastikan data backend mengirim ID dan renderer tabel memakai data-id.'
      );
      return;
    }

    if(type === 'attendance'){
      window.itp2OpenAttendanceDetail(id);
    }

    if(type === 'report'){
      window.itp2OpenReportDetail(id);
    }

  }, true);

  /*
   * Aksi validasi absensi dari modal rapi.
   */
  document.addEventListener('click', function(event){
    var button = event.target.closest('[data-itp2-att-status]');

    if(!button) return;

    event.preventDefault();
    event.stopPropagation();

    var id = button.getAttribute('data-itp2-att-id');
    var status = button.getAttribute('data-itp2-att-status');
    var note = '';

    if(status !== 'VALID'){
      note = prompt('Catatan validasi absensi:', '');
      if(note === null) return;
    }else{
      note = 'Divalidasi admin.';
    }

    apiCall('adminUpdateAttendance',{
      idAbsensi:id,
      attendanceId:id,
      statusValidasi:status,
      status:status,
      catatanValidasi:note,
      note:note
    }).then(function(res){
      if(res && res.success === false) throw new Error(res.message);

      popup('success','Absensi diperbarui','Status absensi berhasil diperbarui.');

      document.getElementById('itp2Modal').classList.remove('show');

      if(typeof window.loadAdminAttendance === 'function'){
        window.loadAdminAttendance();
      }
    }).catch(function(error){
      popup('error','Aksi absensi gagal',error.message);
    });
  });

  /*
   * Aksi validasi laporan dari modal rapi.
   */
  document.addEventListener('click', function(event){
    var button = event.target.closest('[data-itp2-report-status]');

    if(!button) return;

    event.preventDefault();
    event.stopPropagation();

    var id = button.getAttribute('data-itp2-report-id');
    var status = button.getAttribute('data-itp2-report-status');
    var note = '';

    if(status === 'DISETUJUI'){
      note = 'Disetujui admin.';
    }else{
      note = prompt(
        status === 'REVISI'
          ? 'Catatan revisi laporan:'
          : 'Catatan penolakan laporan:',
        ''
      );

      if(note === null) return;
    }

    var currentUser = {};

    try{
      currentUser = window.currentUser || JSON.parse(localStorage.getItem('iTrack_user') || '{}');
    }catch(e){}

    var payload = {
      reportId:id,
      idLaporan:id,
      statusLaporan:status,
      status:status,
      catatanAdmin:note,
      catatan:note,
      validatedBy:
        currentUser.NAMA_LENGKAP ||
        currentUser.namaLengkap ||
        currentUser.USERNAME ||
        currentUser.username ||
        'Admin'
    };

    apiCall('adminUpdateWorkReportStatus',payload).catch(function(){
      return apiCall('validateWorkReport',payload);
    }).then(function(res){
      if(res && res.success === false) throw new Error(res.message);

      popup('success','Laporan diperbarui','Status laporan berhasil diperbarui.');

      document.getElementById('itp2Modal').classList.remove('show');

      if(typeof window.loadAdminReports === 'function'){
        window.loadAdminReports();
      }
    }).catch(function(error){
      popup('error','Aksi laporan gagal',error.message);
    });
  });

})();
</script>
<!-- iTrack Backend Date Time Stable Patch - Preserve UI -->
<script id="itrack-backend-datetime-stable-final">
(function(){
  'use strict';

  /*
   * Tujuan patch:
   * - Frontend menampilkan TANGGAL/JAM persis sesuai backend Asia/Jakarta.
   * - Menghindari bug mundur 1 hari akibat ISO UTC dari Google Sheets/Apps Script.
   * - Menghindari jam ngawur akibat parsing Date object / serial time Google Sheets.
   * - Tidak mengubah UI/UX, hanya mengganti cara membaca dan menampilkan data.
   */
  var TZ = 'Asia/Jakarta';

  function pad(n){ return String(n).padStart(2,'0'); }

  function isDateObject(v){
    return Object.prototype.toString.call(v) === '[object Date]' && !isNaN(v.getTime());
  }

  function safeString(v){
    return v === null || v === undefined ? '' : String(v).trim();
  }

  function any(row, keys, fallback){
    row = row || {};
    for(var i=0;i<keys.length;i++){
      var k = keys[i];
      if(row[k] !== undefined && row[k] !== null && row[k] !== '') return row[k];
    }
    return fallback === undefined ? '' : fallback;
  }

  function esc(v){
    if(typeof window.esc === 'function') return window.esc(v);
    return String(v == null ? '' : v)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#039;');
  }

  function attr(v){
    if(typeof window.escAttr === 'function') return window.escAttr(v);
    return esc(v).replace(/`/g,'&#096;');
  }

  function datePartsJakarta(date){
    try{
      var parts = new Intl.DateTimeFormat('en-CA', {
        timeZone: TZ,
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      }).formatToParts(date);
      var out = {};
      parts.forEach(function(p){ out[p.type] = p.value; });
      return { y: out.year, m: out.month, d: out.day };
    }catch(e){
      return { y: date.getFullYear(), m: pad(date.getMonth()+1), d: pad(date.getDate()) };
    }
  }

  function timePartsJakarta(date){
    try{
      var parts = new Intl.DateTimeFormat('en-GB', {
        timeZone: TZ,
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      }).formatToParts(date);
      var out = {};
      parts.forEach(function(p){ out[p.type] = p.value; });
      return { h: out.hour, min: out.minute };
    }catch(e){
      return { h: pad(date.getHours()), min: pad(date.getMinutes()) };
    }
  }

  function parseExcelSerialDate(num){
    // Google Sheets kadang mengirim tanggal sebagai serial number Excel.
    // Epoch Excel 1899-12-30.
    var ms = Math.round((Number(num) - 25569) * 86400 * 1000);
    return new Date(ms);
  }

  function displayDateBackend(v){
    if(v === null || v === undefined || v === '') return '-';
    if(isDateObject(v)){
      var p0 = datePartsJakarta(v);
      return p0.d + '/' + p0.m + '/' + p0.y;
    }

    if(typeof v === 'number' && isFinite(v)){
      var dn = parseExcelSerialDate(v);
      var pn = datePartsJakarta(dn);
      return pn.d + '/' + pn.m + '/' + pn.y;
    }

    var s = safeString(v);
    if(!s) return '-';

    // Jika backend sudah kirim display lokal, jangan diparse ulang.
    var dm = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
    if(dm) return pad(dm[1]) + '/' + pad(dm[2]) + '/' + dm[3];

    // Jika backend kirim YYYY-MM-DD tanpa jam, pakai apa adanya tanpa timezone conversion.
    var isoDateOnly = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if(isoDateOnly) return isoDateOnly[3] + '/' + isoDateOnly[2] + '/' + isoDateOnly[1];

    // Jika backend kirim ISO DateTime dari Apps Script, format dengan timezone Jakarta.
    if(/^\d{4}-\d{2}-\d{2}T/.test(s) || /Z$/.test(s)){
      var d = new Date(s);
      if(!isNaN(d.getTime())){
        var p = datePartsJakarta(d);
        return p.d + '/' + p.m + '/' + p.y;
      }
    }

    // Jika ada tanggal YYYY-MM-DD di awal string panjang, gunakan tanggalnya tanpa menggeser hari.
    var embedded = s.match(/(\d{4})-(\d{2})-(\d{2})/);
    if(embedded) return embedded[3] + '/' + embedded[2] + '/' + embedded[1];

    return s;
  }

  function isoDateForInput(v){
    if(v === null || v === undefined || v === '') return '';
    if(isDateObject(v)){
      var p0 = datePartsJakarta(v);
      return p0.y + '-' + p0.m + '-' + p0.d;
    }
    if(typeof v === 'number' && isFinite(v)){
      var dn = parseExcelSerialDate(v);
      var pn = datePartsJakarta(dn);
      return pn.y + '-' + pn.m + '-' + pn.d;
    }
    var s = safeString(v);
    var dm = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
    if(dm) return dm[3] + '-' + pad(dm[2]) + '-' + pad(dm[1]);
    var isoDateOnly = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if(isoDateOnly) return isoDateOnly[1] + '-' + isoDateOnly[2] + '-' + isoDateOnly[3];
    if(/^\d{4}-\d{2}-\d{2}T/.test(s) || /Z$/.test(s)){
      var d = new Date(s);
      if(!isNaN(d.getTime())){
        var p = datePartsJakarta(d);
        return p.y + '-' + p.m + '-' + p.d;
      }
    }
    var embedded = s.match(/(\d{4})-(\d{2})-(\d{2})/);
    if(embedded) return embedded[1] + '-' + embedded[2] + '-' + embedded[3];
    return s;
  }

  function displayTimeBackend(v){
    if(v === null || v === undefined || v === '') return '--:--';
    if(isDateObject(v)){
      var t0 = timePartsJakarta(v);
      return t0.h + ':' + t0.min;
    }

    // Google Sheets time value sebagai pecahan hari: 0.2916667 = 07:00.
    if(typeof v === 'number' && isFinite(v)){
      if(v >= 0 && v < 1){
        var total = Math.round(v * 24 * 60);
        return pad(Math.floor(total/60) % 24) + ':' + pad(total % 60);
      }
      var dt = parseExcelSerialDate(v);
      var tp = timePartsJakarta(dt);
      return tp.h + ':' + tp.min;
    }

    var s = safeString(v);
    if(!s) return '--:--';

    // Kalau backend sudah kirim HH:mm atau HH:mm:ss, pakai apa adanya.
    var hm = s.match(/^(\d{1,2}):(\d{2})(?::\d{2})?$/);
    if(hm) return pad(hm[1]) + ':' + hm[2];

    // ISO DateTime dari Apps Script: format ke WIB.
    if(/^\d{4}-\d{2}-\d{2}T/.test(s) || /Z$/.test(s)){
      var d = new Date(s);
      if(!isNaN(d.getTime())){
        var t = timePartsJakarta(d);
        return t.h + ':' + t.min;
      }
    }

    // String panjang yang mengandung HH:mm.
    var m = s.match(/(?:T|\s)(\d{1,2}):(\d{2})/);
    if(m) return pad(m[1]) + ':' + m[2];

    return s;
  }

  function displayDateTimeBackend(v){
    if(!v) return '-';
    var date = displayDateBackend(v);
    var time = displayTimeBackend(v);
    return date + (time && time !== '--:--' ? ' ' + time : '');
  }

  // Override helper global agar tabel, filter result, dan detail memakai timezone stabil.
  window.formatDateID = displayDateBackend;
  window.onlyTime = displayTimeBackend;
  window.formatDateTimeID = displayDateTimeBackend;
  window.toDateInput = isoDateForInput;
  window.iTrackBackendDate = {
    displayDate: displayDateBackend,
    inputDate: isoDateForInput,
    displayTime: displayTimeBackend,
    displayDateTime: displayDateTimeBackend,
    timezone: TZ
  };

  function badge(status){
    if(typeof window.badge === 'function') return window.badge(status);
    return '<span class="badge">' + esc(status || '-') + '</span>';
  }

  function normalizeDriveImage(url){
    url = safeString(url);
    if(!url) return '';
    var m1 = url.match(/drive\.google\.com\/file\/d\/([^/]+)/);
    if(m1 && m1[1]) return 'https://drive.google.com/uc?export=view&id=' + m1[1];
    var m2 = url.match(/[?&]id=([^&]+)/);
    if(url.indexOf('drive.google.com') !== -1 && m2 && m2[1]) return 'https://drive.google.com/uc?export=view&id=' + m2[1];
    return url;
  }

  function mapUrl(lat, lng, fallback){
    if(lat !== '' && lat !== null && lat !== undefined && lng !== '' && lng !== null && lng !== undefined){
      return 'https://www.google.com/maps?q=' + encodeURIComponent(String(lat) + ',' + String(lng));
    }
    return fallback || '';
  }

  function ensureModal(){
    if(document.getElementById('itp2Modal')) return;
    var el = document.createElement('div');
    el.id = 'itp2Modal';
    el.className = 'itp2-bg';
    el.innerHTML = ''
      + '<div class="itp2-modal">'
      + '<div class="itp2-head">'
      + '<div><h2 id="itp2Title">Detail</h2><p id="itp2Sub">Informasi detail.</p></div>'
      + '<button type="button" class="itp2-close" id="itp2Close">Tutup</button>'
      + '</div><div id="itp2Body"></div></div>';
    document.body.appendChild(el);
    document.getElementById('itp2Close').onclick = function(){ el.classList.remove('show'); };
  }

  function showModal(title, sub, html){
    ensureModal();
    document.getElementById('itp2Title').textContent = title || 'Detail';
    document.getElementById('itp2Sub').textContent = sub || '';
    document.getElementById('itp2Body').innerHTML = html || '';
    document.getElementById('itp2Modal').classList.add('show');
  }

  function info(label, value){
    return '<div class="itp2-info"><small>' + esc(label) + '</small><b>' + (String(value || '').indexOf('<span') === 0 ? value : esc(value || '-')) + '</b></div>';
  }

  function photoCard(title, url){
    var img = normalizeDriveImage(url);
    return '<div class="itp2-photo-card">'
      + (img ? '<img src="' + attr(img) + '" alt="' + attr(title) + '" onclick="window.open(\'' + attr(img) + '\',\'_blank\')">' : '<div class="itp2-photo-empty">Foto belum tersedia</div>')
      + '<div><b>' + esc(title) + '</b><br>' + (img ? 'Klik foto untuk membuka ukuran penuh.' : 'Tidak ada dokumentasi foto.') + '</div>'
      + '</div>';
  }

  function lateInfo(att){
    var status = String(any(att, ['Status Kehadiran','STATUS_KEHADIRAN','statusKehadiran','status'], '')).toUpperCase();
    var jam = displayTimeBackend(any(att, ['Jam Masuk','JAM_MASUK','jamMasuk','checkIn'], ''));
    if(status.indexOf('TERLAMBAT') !== -1) return { text:'Terlambat', detail:'Status kehadiran tercatat terlambat.', cls:'warn' };
    var m = String(jam).match(/(\d{2}):(\d{2})/);
    if(m){
      var mins = Number(m[1]) * 60 + Number(m[2]);
      if(mins > 8*60) return { text:'Terlambat', detail:'Jam masuk melewati batas 08:00.', cls:'warn' };
      return { text:'Tepat waktu', detail:'Jam masuk tidak melewati batas 08:00.', cls:'good' };
    }
    return { text:'Belum diketahui', detail:'Jam masuk belum tersedia.', cls:'' };
  }

  function radiusInfo(att){
    var d = any(att, ['Jarak Masuk Meter','JARAK_MASUK_METER','Jarak Meter','JARAK_METER','distanceMeter','jarakMeter','Jarak Masuk','jarakMasuk'], '');
    var r = any(att, ['Radius Kantor','RADIUS_KANTOR','officeRadius','radius'], 100);
    var n = parseFloat(String(d).replace(/[^\d.]/g,''));
    if(!isNaN(n)){
      if(n <= Number(r || 100)) return { text:'Dalam radius', detail:Math.round(n) + ' meter dari kantor.', cls:'good' };
      return { text:'Luar radius', detail:Math.round(n) + ' meter dari kantor.', cls:'warn' };
    }
    return { text:'Belum diketahui', detail:'Data jarak tidak tersedia.', cls:'' };
  }

  function renderAttendanceDetailStable(data, attendanceId){
    var att = data && (data.attendance || data.detail || data.absensi || data.data) || data || {};
    if(att && att.attendance) att = att.attendance;

    var nama = any(att, ['Nama Lengkap','NAMA_LENGKAP','namaLengkap','nama'], '-');
    var username = any(att, ['Nama Pengguna','USERNAME','username'], '-');
    var divisi = any(att, ['Divisi','DIVISI','divisi'], '-');
    var tanggal = displayDateBackend(any(att, ['Tanggal','TANGGAL','tanggal','date','Tanggal Absensi'], '-'));
    var jamMasuk = displayTimeBackend(any(att, ['Jam Masuk','JAM_MASUK','jamMasuk','checkIn'], ''));
    var jamPulang = displayTimeBackend(any(att, ['Jam Pulang','JAM_PULANG','jamPulang','checkOut'], ''));
    var total = any(att, ['Total Jam Kerja','TOTAL_JAM_KERJA','totalJamKerja','total'], '-');
    var statusHadir = any(att, ['Status Kehadiran','STATUS_KEHADIRAN','statusKehadiran','status'], '-');
    var statusValidasi = any(att, ['Status Validasi','STATUS_VALIDASI','statusValidasi'], '-');
    var accuracy = any(att, ['Akurasi','AKURASI','accuracy','akurasi'], '-');
    var late = lateInfo(att);
    var radius = radiusInfo(att);

    var latMasuk = any(att, ['Latitude Masuk','LATITUDE_MASUK','latitudeMasuk','latMasuk','latitude']);
    var lngMasuk = any(att, ['Longitude Masuk','LONGITUDE_MASUK','longitudeMasuk','lngMasuk','longitude']);
    var latPulang = any(att, ['Latitude Pulang','LATITUDE_PULANG','latitudePulang','latPulang']);
    var lngPulang = any(att, ['Longitude Pulang','LONGITUDE_PULANG','longitudePulang','lngPulang']);
    var mapsMasuk = any(att, ['Peta Masuk','Maps Masuk','MAPS_MASUK','mapsMasuk']);
    var mapsPulang = any(att, ['Peta Pulang','Maps Pulang','MAPS_PULANG','mapsPulang']);
    var fotoMasuk = any(att, ['Foto Masuk','FOTO_MASUK_URL','FOTO_MASUK','fotoMasuk','PHOTO_IN','photoIn','URL Foto Masuk','SELFIE_MASUK']);
    var fotoPulang = any(att, ['Foto Pulang','FOTO_PULANG_URL','FOTO_PULANG','fotoPulang','PHOTO_OUT','photoOut','URL Foto Pulang','SELFIE_PULANG']);
    var catatan = any(att, ['Keterangan','KETERANGAN','Catatan','CATATAN','catatan'], '-');
    var catatanValidasi = any(att, ['Catatan Validasi','CATATAN_VALIDASI','catatanValidasi'], '-');

    var html = '';
    html += '<div class="itp2-summary">';
    html += info('Nama Peserta', nama);
    html += info('Username', username);
    html += info('Tanggal', tanggal);
    html += info('Divisi', divisi);
    html += info('Jam Masuk', jamMasuk);
    html += info('Jam Pulang', jamPulang);
    html += info('Total Jam', total);
    html += info('Status Kehadiran', badge(statusHadir));
    html += info('Validasi', badge(statusValidasi));
    html += info('Ketepatan Waktu', '<span class="itp2-badge ' + late.cls + '">' + esc(late.text) + '</span>');
    html += info('Radius Lokasi', '<span class="itp2-badge ' + radius.cls + '">' + esc(radius.text) + '</span>');
    html += info('Akurasi GPS', accuracy === '-' ? '-' : accuracy + ' meter');
    html += '</div>';
    html += '<div class="itp2-section"><h3>Penjelasan Status</h3><div class="itp2-grid2">' + info('Info Ketepatan Waktu', late.detail) + info('Info Radius', radius.detail) + '</div></div>';
    html += '<div class="itp2-section"><h3>Foto Absensi</h3><div class="itp2-photo-grid">' + photoCard('Foto Masuk', fotoMasuk) + photoCard('Foto Pulang', fotoPulang) + '</div></div>';
    html += '<div class="itp2-section"><h3>Lokasi dan Maps</h3>';
    var linkMasuk = mapUrl(latMasuk, lngMasuk, mapsMasuk);
    var linkPulang = mapUrl(latPulang, lngPulang, mapsPulang);
    if(linkMasuk) html += '<a class="itp2-map-link" href="' + attr(linkMasuk) + '" target="_blank">📍 Buka Maps Masuk</a>';
    if(linkPulang) html += '<a class="itp2-map-link" href="' + attr(linkPulang) + '" target="_blank">📍 Buka Maps Pulang</a>';
    if(!linkMasuk && !linkPulang) html += '<div class="itp2-empty">Titik lokasi belum tersedia.</div>';
    html += '</div>';
    html += '<div class="itp2-section"><h3>Catatan</h3><div class="itp2-grid2">' + info('Catatan Peserta', catatan) + info('Catatan Validasi', catatanValidasi) + '</div></div>';
    html += '<div class="itp2-actions">';
    html += '<button type="button" class="btn btn-green" data-itp2-att-status="VALID" data-itp2-att-id="' + attr(attendanceId) + '">Tandai Valid</button>';
    html += '<button type="button" class="btn btn-orange" data-itp2-att-status="PERLU_REVIEW" data-itp2-att-id="' + attr(attendanceId) + '">Perlu Review</button>';
    html += '<button type="button" class="btn btn-red" data-itp2-att-status="INVALID" data-itp2-att-id="' + attr(attendanceId) + '">Tolak</button>';
    html += '</div>';
    return html;
  }

  async function apiCall(action, payload){
    if(typeof window.api === 'function') return await window.api(action, payload || {});
    throw new Error('Fungsi API tidak tersedia.');
  }

  window.itp2OpenAttendanceDetail = async function(attendanceId){
    try{
      var res = await apiCall('adminGetAttendanceDetail', { idAbsensi: attendanceId, attendanceId: attendanceId });
      if(res && res.success === false) throw new Error(res.message || 'Detail absensi gagal dimuat.');
      var data = res.data || res;
      var html = renderAttendanceDetailStable(data, attendanceId);
      showModal('Detail Absensi', 'Informasi absensi mengikuti tanggal dan jam dari backend Asia/Jakarta.', html);
    }catch(error){
      if(typeof window.toast === 'function') window.toast('Gagal memuat detail absensi', error.message, 'error');
      else alert('Gagal memuat detail absensi\n' + error.message);
    }
  };

  // Jika ada fungsi detail lama dari patch admin, arahkan juga ke pembaca stabil ini.
  if(window.itxAdmin && typeof window.itxAdmin.detailAttendance === 'function'){
    window.itxAdmin.detailAttendance = function(id){ return window.itp2OpenAttendanceDetail(id); };
  }
  if(window.itx2Admin && typeof window.itx2Admin.detailAttendance === 'function'){
    window.itx2Admin.detailAttendance = function(id){ return window.itp2OpenAttendanceDetail(id); };
  }

  // Refresh tabel yang sudah terlanjur render agar tanggal/jam ikut helper baru.
  setTimeout(function(){
    try{ if(typeof window.loadAdminAttendance === 'function') window.loadAdminAttendance(); }catch(e){}
    try{ if(typeof window.loadAttendanceMonitoring === 'function') window.loadAttendanceMonitoring(); }catch(e){}
  }, 500);

  console.warn('[iTrack] Backend date/time stable patch aktif. Display mengikuti Asia/Jakarta tanpa mundur 1 hari.');
})();
</script>

<script id="itrack-native-smart-loading-script">
(function(){
  'use strict';

  var SHOW_DELAY = 1800;
  var MIN_VISIBLE = 500;
  var active = 0;
  var timer = null;
  var shownAt = 0;
  var seq = 0;
  var tokens = {};

  function ensure(){
    if(document.getElementById('iTrackNativeLoading')) return;
    var el = document.createElement('div');
    el.id = 'iTrackNativeLoading';
    el.className = 'inl-bg';
    el.innerHTML = ''
      + '<div class="inl-card">'
      + '<div class="inl-orb"><div class="inl-ring"></div><div class="inl-logo"></div></div>'
      + '<h3 id="iTrackNativeLoadingTitle">Memproses</h3>'
      + '<p id="iTrackNativeLoadingText">Mohon tunggu sebentar, data sedang disiapkan.</p>'
      + '<div class="inl-progress"><span></span></div>'
      + '<div class="inl-foot">iTrack Internship OJK DIY</div>'
      + '</div>';
    document.body.appendChild(el);
  }

  function setText(title, message){
    ensure();
    var t = document.getElementById('iTrackNativeLoadingTitle');
    var m = document.getElementById('iTrackNativeLoadingText');
    if(t) t.textContent = title || 'Memproses';
    if(m) m.textContent = message || 'Mohon tunggu sebentar, data sedang disiapkan.';
  }

  function showNow(){
    ensure();
    var el = document.getElementById('iTrackNativeLoading');
    if(el && !el.classList.contains('show')){
      shownAt = Date.now();
      el.classList.add('show');
    }
  }

  function hideNow(){
    var el = document.getElementById('iTrackNativeLoading');
    if(el) el.classList.remove('show');
    shownAt = 0;
  }

  function begin(title, message, delay){
    ensure();
    var token = 'inl_' + (++seq);
    tokens[token] = true;
    active++;
    setText(title, message);
    clearTimeout(timer);
    timer = setTimeout(function(){
      if(active > 0) showNow();
    }, typeof delay === 'number' ? delay : SHOW_DELAY);
    return token;
  }

  function end(token){
    if(token && tokens[token]){
      delete tokens[token];
      active = Math.max(0, active - 1);
    }else if(!token){
      active = Math.max(0, active - 1);
    }

    if(active > 0) return;

    clearTimeout(timer);

    var wait = shownAt ? Math.max(0, MIN_VISIBLE - (Date.now() - shownAt)) : 0;

    setTimeout(function(){
      if(active === 0) hideNow();
    }, wait);
  }

  function clear(){
    active = 0;
    tokens = {};
    clearTimeout(timer);
    hideNow();
  }

  function actionText(action){
    var a = String(action || '').toLowerCase();

    if(a.indexOf('login') !== -1) return ['Memverifikasi akun','Akun sedang diverifikasi dengan server.'];
    if(a.indexOf('attendance') !== -1 || a.indexOf('absensi') !== -1) return ['Memuat absensi','Data absensi sedang diproses.'];
    if(a.indexOf('report') !== -1 || a.indexOf('laporan') !== -1) return ['Memuat laporan','Data laporan sedang disiapkan.'];
    if(a.indexOf('revision') !== -1 || a.indexOf('revisi') !== -1) return ['Memproses revisi','Data revisi laporan sedang diproses.'];
    if(a.indexOf('export') !== -1) return ['Menyiapkan export','Dokumen sedang dibuat, proses ini bisa memerlukan beberapa detik.'];
    if(a.indexOf('leave') !== -1 || a.indexOf('izin') !== -1) return ['Memuat izin','Data izin sedang diproses.'];
    if(a.indexOf('user') !== -1 || a.indexOf('peserta') !== -1) return ['Memuat peserta','Data peserta sedang disiapkan.'];

    return ['Menghubungkan ke server','Sinkronisasi data iTrack sedang berjalan.'];
  }

  window.iTrackNativeLoading = {
    begin: begin,
    end: end,
    clear: clear,
    showNow: showNow
  };

  var manualToken = null;
