function bindCoreEvents(){document.querySelectorAll('[data-auth]').forEach(el=>el.addEventListener('click',()=>switchAuth(el.getAttribute('data-auth'))));document.querySelectorAll('[data-toggle]').forEach(el=>el.addEventListener('click',()=>togglePassword(el.getAttribute('data-toggle'))));document.querySelectorAll('[data-open]').forEach(el=>el.addEventListener('click',()=>openView(el.getAttribute('data-open'))));on('btnGoogle','click',()=>toast('Info','Login Google Workspace belum aktif. Gunakan akses manual.','warning'));on('formLogin','submit',handleLogin);on('formRegister','submit',handleRegister);on('formStatus','submit',handleCheckStatus);on('formForgot','submit',handleRequestReset);on('formReset','submit',handlePerformReset);on('btnLogoutMobile','click',logout);on('btnLogoutSide','click',logout);on('btnCheckIn','click',()=>openInlineCamera('in'));on('btnCheckOut','click',()=>openInlineCamera('out'));on('btnOutside','click',openOutsideAttendanceModal);on('btnRefreshAdminHome','click',loadAdminAttendance);on('btnMyAttendance','click',loadMyAttendance);on('btnAddWork','click',addWorkItem);on('formWork','submit',submitWorkReportForm);on('btnMyReports','click',loadMyReports);on('formLeave','submit',submitLeaveForm);on('btnMyLeaves','click',loadMyLeaves);on('profilePhotoGallery','change',handleProfilePhoto);on('profilePhotoCamera','change',handleProfilePhoto);on('formProfile','submit',submitProfileDetails);on('formPassword','submit',submitChangePassword);on('btnLoadAdminAttendance','click',loadAdminAttendance);on('btnExportAttendancePdf','click',()=>exportAttendancePdf(false));on('btnLoadAdminReports','click',loadAdminReports);on('btnFilterReports','click',loadAdminReports);on('btnExportReportsPdf','click',()=>exportWorkReportPdf(false));on('btnLoadAdminLeaves','click',loadAdminLeaves);on('btnLoadRegs','click',loadPendingRegistrations);on('btnLoadUsers','click',loadUsers);on('btnExpAttPdf','click',()=>exportAttendancePdf(true));on('btnExpAttCsv','click',exportAttend async function api(action,payload){const res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,payload:payload===undefined?{}:payload})});const txt=await res.text();let raw;try{raw=JSON.parse(txt);}catch(e){throw new Error('Respons backend tidak valid. Pastikan Web App sudah deploy terbaru.');}return unwrap(raw);}
function unwrap(raw){if(raw&&raw.success===true&&raw.data&&typeof raw.data==='object'&&raw.data.hasOwnProperty('success'))return raw.data;if(raw&&raw.success===true&&raw.meta&&raw.hasOwnProperty('data'))return raw.data;return raw;}
async function fetchServerTime(silent){try{const res=await api('getServerTime',{});if(res&&res.success){serverTimeData=res.data||{};return serverTimeData;}throw new Error(res.message||'Server time tidak tersedia.');}catch(e){if(!silent)toast('Jam backend gagal','Preview memakai waktu perangkat sementara.','warning');serverTimeData={serverDate:toDateInput(new Date()),serverTime:onlyTime(formatDateTimeID(new Date())),serverNowDisplay:formatDateTimeID(new Date())+' WIB',timezone:'Asia/Jakarta',source:'DEVICE_FALLBACK'};return serverTimeData;}}
function showLoading(t,d){text('loadingTitle',t||'Memproses...');text('loadingText',d||'Mohon tunggu.');document.getElementById('loading').classList.add('show');}function hideLoading(){document.getElementById('loading').classList.remove('show');}
function toast(t,m,type){const layer=document.getElementById('toast');const cls=type||'info';const ico=cls==='success'?'✓':cls==='error'?'×':cls==='warning'?'!':'i';layer.innerHTML='<div class="toast-card '+cls+'"><div class="toast-ico">'+ico+'</div><div><h3>'+esc(t)+'</h3><p>'+esc(m||'')+'</p></div></div>';layer.classList.add('show');clearTimeout(layer._t);layer._t=setTimeout(()=>layer.classList.remove('show'),3600);}

async function handleLogin(e){e.preventDefault();showLoading('Memverifikasi akun...','Menghubungkan ke backend.');try{const res=await api('loginUser',{email:val('loginEmail'),password:document.getElementById('loginPassword').value});if(!res.success)throw new Error(res.message);openApp(res.data.user);toast('Login berhasil',isAdminRole(res.data.user.ROLE)?'Mode admin aktif.':'Mode peserta aktif.','success');}catch(err){toast('Login gagal',err.message,'error');}finally{hideLoading();clearSensitive();}}

function renderAdminAttendance(rows){const full=document.getElementById('adminAttendanceRows'),home=document.getElementById('adminHomeAttendanceRows');const html=rows.slice(0,150).map((r,i)=>{let maps=r.MAPS_MASUK?'<a target="_blank" href="'+escAttr(r.MAPS_MASUK)+'">Masuk</a>':'-';if(r.MAPS_PULANG)maps+=' / <a target="_blank" href="'+escAttr(r.MAPS_PULANG)+'">Pulang</a>';const id=escAttr(r.ATTENDANCE_ID||'');const actions=id?'<div style="display:flex;gap:6px;flex-wrap:wrap"><button class="btn btn-green btn-mini attendance-action" data-id="'+id+'" data-status="VALID">Valid</button><button class="btn btn-orange btn-mini attendance-action" data-id="'+id+'" data-status="PERLU_REVIEW">Review</button><button class="btn btn-red btn-mini attendance-action" data-id="'+id+'" data-status="INVALID">Tolak</button></div>':'-';return rowHtml([i+1,formatDateID(r.TANGGAL),r.NAMA_LENGKAP||'-',r.DIVISI||'-',onlyTime(r.JAM_MASUK),onlyTime(r.JAM_PULANG),r.TOTAL_JAM_KERJA||'-',badge(r.STATUS_KEHADIRAN),maps,actions],['No','Tanggal','Nama','Divisi','Masuk','Pulang','Total','Status','Maps','Aksi']);}).join('');if(full)full.innerHTML=html||'<tr><td colspan="10"><div class="empty">Tidak ada data.</div></td></tr>';if(home)home.innerHTML=rows.slice(0,8).map((r,i)=>rowHtml([i+1,formatDateID(r.TANGGAL),r.NAMA_LENGKAP||'-',onlyTime(r.JAM_MASUK),onlyTime(r.JAM_PULANG),badge(r.STATUS_KEHADIRAN)],['No','Tanggal','Nama','Masuk','Pulang','Status'])).join('')||'<tr><td colspan="6"><div class="empty">Tidak ada data.</div></td></tr>';document.querySelectorAll('.attendance-action').forEach(b=>b.addEventListener('click',()=>validateAttendanceAdmin(b.getAttribute('data-id'),b.getAttribute('data-status'))));}

async function validateReport(id,status){const note=prompt('Catatan admin (opsional):','')||'';showLoading('Memvalidasi laporan...','Memperbarui status.');try{const res=await api('validateWorkReport',{reportId:id,status,validatedBy:currentUser.USERNAME,catatanAdmin:note});if(!res.success)throw new Error(res.message);toast('Berhasil',res.message,'success');loadAdminReports();loadDashboardSummary();}catch(e){toast('Gagal',e.message,'error');}finally{hideLoading();}}

function renderAdminLeaves(rows){const tb=document.getElementById('adminLeaveRows');if(!tb)return;if(!rows.length){tb.innerHTML='<tr><td colspan="8"><div class="empty">Tidak ada izin.</div></td></tr>';return;}tb.innerHTML=rows.map((r,i)=>{const id=escAttr(r.LEAVE_ID);const act=r.STATUS_APPROVAL==='MENUNGGU'?'<button class="btn btn-green leave-approve" data-id="'+id+'">Setujui</button> <button class="btn btn-red leave-reject" data-id="'+id+'">Tolak</button>':'-';return rowHtml([i+1,formatDateID(r.TANGGAL_PENGAJUAN),r.NAMA_LENGKAP||'-',r.JENIS_IZIN||'-',formatDateID(r.TANGGAL_MULAI)+' s.d. '+formatDateID(r.TANGGAL_SELESAI),r.ALASAN||'-',badge(r.STATUS_APPROVAL),act],['No','Tanggal','Nama','Jenis','Periode','Alasan','Status','Aksi']);}).join('');document.querySelectorAll('.leave-approve').forEach(b=>b.addEventListener('click',()=>approveLeaveAdmin(b.getAttribute('data-id'))));document.querySelectorAll('.leave-reject').forEach(b=>b.addEventListener('click',()=>rejectLeaveAdmin(b.getAttribute('data-id'))));}

function renderRegistrations(rows){const tb=document.getElementById('registrationRows');if(!tb)return;if(!rows.length){tb.innerHTML='<tr><td colspan="7"><div class="empty">Tidak ada registrasi.</div></td></tr>';return;}tb.innerHTML=rows.map((r,i)=>{const id=escAttr(r.REG_ID);const act='<button class="btn btn-green reg-approve" data-id="'+id+'">Setujui</button> <button class="btn btn-red reg-reject" data-id="'+id+'">Tolak</button>';return rowHtml([i+1,r.NAMA_LENGKAP||'-',r.USERNAME||'-',r.EMAIL||'-',r.DIVISI||'-',badge(r.STATUS),act],['No','Nama','Username','Email','Divisi','Status','Aksi']);}).join('');document.querySelectorAll('.reg-approve').forEach(b=>b.addEventListener('click',()=>approveReg(b.getAttribute('data-id'))));document.querySelectorAll('.reg-reject').forEach(b=>b.addEventListener('click',()=>rejectReg(b.getAttribute('data-id'))));}

function renderUsers(rows){const tb=document.getElementById('userRows');if(!tb)return;if(!rows.length){tb.innerHTML='<tr><td colspan="7"><div class="empty">Tidak ada peserta.</div></td></tr>';return;}tb.innerHTML=rows.map((r,i)=>rowHtml([i+1,r.NAMA_LENGKAP||'-',r.USERNAME||'-',r.EMAIL||'-',r.ROLE||'-',r.DIVISI||'-',badge(r.STATUS_AKUN)],['No','Nama','Username','Email','Role','Divisi','Status'])).join('');}
function exportPayload(fromExport,type){if(fromExport)return{startDate:val('expStart'),endDate:val('expEnd'),officerName:val('expPerson'),exportedBy:currentUser?currentUser.USERNAME:'',emailTo:currentUser?currentUser.EMAIL:''};if(type==='report')return{startDate:val('repStart'),endDate:val('repEnd'),officerName:val('repPerson'),exportedBy:currentUser?currentUser.USERNAME:'',emailTo:currentUser?currentUser.EMAIL:''};return{startDate:val('attStart'),endDate:val('attEnd'),officerName:val('attPerson'),exportedBy:currentUser?currentUser.USERNAME:'',emailTo:currentUser?currentUser.EMAIL:''};}
async function exportAttendancePdf(fromExport){showLoading('Membuat PDF absensi...','File dibuat di backend.');try{const res=await api('exportAttendancePdf',exportPayload(fromExport,'attendance'));if(!res.success)throw new Error(res.message);toast('Export berhasil','PDF absensi dibuat.','success');if(res.data&&res.data.fileUrl)window.open(res.data.fileUrl,'_blank');}catch(e){toast('Export gagal',e.message,'error');}finally{hideLoading();}}

function compressVideoFrame(video,maxWidth,quality){return new Promise((resolve,reject)=>{try{let w=video.videoWidth||960,h=video.videoHeight||720;if(!w||!h){reject(new Error('Video belum siap.'));return;}const ratio=Math.min(maxWidth/w,1),nw=Math.round(w*ratio),nh=Math.round(h*ratio),canvas=document.createElement('canvas');canvas.width=nw;canvas.height=nh;canvas.getContext('2d').drawImage(video,0,0,nw,nh);resolve(canvas.toDataURL('image/jpeg',quality||.55));}catch(e){reject(e);}});}
function compressImageFile(file,maxWidth,quality){return new Promise((resolve,reject)=>{const reader=new FileReader();reader.onload=e=>{const img=new Image();img.onload=()=>{const ratio=Math.min(maxWidth/img.width,1),nw=Math.round(img.width*ratio),nh=Math.round(img.height*ratio),canvas=document.createElement('canvas');canvas.width=nw;canvas.height=nh;canvas.getContext('2d').drawImage(img,0,0,nw,nh);resolve(canvas.toDataURL('image/jpeg',quality||.55));};img.onerror=()=>reject(new Error('File gambar tidak valid.'));img.src=e.target.result;};reader.onerror=()=>reject(new Error('Gagal membaca file.'));reader.readAsDataURL(file);});}

function setLargeAvatar(){const av=document.getElementById('profileAvatar');if(!av||!currentUser)return;av.style.backgroundImage='';av.textContent=(currentUser.NAMA_LENGKAP||currentUser.USERNAME||'I').charAt(0).toUpperCase();if(currentUser.PHOTO_URL){av.style.backgroundImage='url("'+currentUser.PHOTO_URL+'")';av.textContent='';}}
function normalizeUser(u){u=u||{};return{USER_ID:u.USER_ID||u.userId||'',USERNAME:u.USERNAME||u.username||'',NAMA_LENGKAP:u.NAMA_LENGKAP||u.namaLengkap||u.name||'',ROLE:u.ROLE||u.role||'',STATUS_AKUN:u.STATUS_AKUN||u.statusAkun||u.status||'',PHOTO_URL:u.PHOTO_URL||u.photoUrl||u.photo||'',EMAIL:u.EMAIL||u.email||'',DIVISI:u.DIVISI||u.divisi||'',JABATAN:u.JABATAN||u.jabatan||'',NO_HP:u.NO_HP||u.noHp||'',LAST_LOGIN:u.LAST_LOGIN||''};}
function isAdminRole(r){r=String(r||'').toUpperCase();return['SUPER_ADMIN','SUPERADMIN','ADMIN','SUPERVISOR'].indexOf(r)>-1;}
function clearSensitive(){['loginPassword','regPassword','regPassword2','otpPassword','otpPassword2','oldPassword','newPassword','newPassword2'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});}
function initDates(){const now=new Date();text('todayLabel',formatLongDate(now));text('todayAdminLabel',formatLongDate(now));text('attendanceDateLabel',formatLongDate(now));}
function setDefaultDates(){const d=toDateInput(new Date());['workDate','leaveStart','leaveEnd','attStart','attEnd','repStart','repEnd','expStart','expEnd'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=d;});}
function badge(v){const s=String(v||'-').toUpperCase();let c='badge-default';if(['AKTIF','HADIR','DISETUJUI','VALID'].indexOf(s)>-1)c='badge-success';if(['TERLAMBAT','MENUNGGU','MENUNGGU_REVIEW','MENUNGGU_VERIFIKASI','REVISI','PERLU_REVIEW'].indexOf(s)>-1)c='badge-warning';if(['IZIN','SAKIT','DINAS_LUAR','IZIN_PRIBADI','CUTI','LUAR_LOKASI'].indexOf(s)>-1)c='badge-info';if(['DITOLAK','NONAKTIF','ALPHA','INVALID'].indexOf(s)>-1)c='badge-danger';return'<span class="badge '+c+'">'+esc(displayStatus(s))+'</span>';}
function displayStatus(s){return String(s||'-').replace(/_/g,' ').toLowerCase().replace(/(^|\s)\S/g,a=>a.toUpperCase());}
function rowHtml(values,labels){return'<tr>'+values.map((v,i)=>'<td data-label="'+esc(labels[i])+'">'+(v==null?'':v)+'</td>').join('')+'</tr>';}
function val(id){const el=document.getElementById(id);return el?String(el.value||'').trim():'';}function setValue(id,v){const el=document.getElementById(id);if(el)el.value=v||'';}function text(id,v){const el=document.getElementById(id);if(el)el.textContent=v==null?'':v;}
function esc(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}function escAttr(v){return esc(v).replace(/`/g,'&#096;');}
function toDateInput(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}function formatDateID(v){if(!v)return'-';const s=String(v).split(' ')[0],p=s.split('-');if(p.length===3)return p[2]+'/'+p[1]+'/'+p[0];return s;}
function formatLongDate(d){return d.toLocaleDateString('id-ID',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});}function formatDateTimeID(d){return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function onlyTime(v){if(!v)return'--:--';const m=String(v).match(/(\d{1,2}):(\d{2})/);return m?String(m[1]).padStart(2,'0')+':'+m[2]:String(v);}function serverTimeDisplay(){if(serverTimeData&&serverTimeData.serverNowDisplay)return serverTimeData.serverNowDisplay;if(serverTimeData&&serverTimeData.serverDate&&serverTimeData.serverTime)return serverTimeData.serverDate+' '+serverTimeData.serverTime+' WIB';return formatDateTimeID(new Date())+' WIB';}
function shortDuration(v){return String(v||'0 jam 0 menit').replace(' jam ','j ').replace(' menit','m');}function distanceMeters(a,b,c,d){const R=6371000,rad=x=>x*Math.PI/180,dl=rad(c-a),dn=rad(d-b),x=Math.sin(dl/2)*Math.sin(dl/2)+Math.cos(rad(a))*Math.cos(rad(c))*Math.sin(dn/2)*Math.sin(dn/2);return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function downloadText(name,content){const blob=new Blob([content],{type:'text/plain;charset=utf-8'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),800);}
function registerSW(){if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').then(()=>console.log('Service Worker aktif.')).catch(e=>console.warn(e.message));}
