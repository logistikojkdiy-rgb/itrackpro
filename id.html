async function simpleAction(action,payload,msg='Berhasil'){showLoading('Memproses...','Menyimpan data.');try{let r=await api(action,payload);if(!r.success)throw new Error(r.message);toast(msg,r.message||'Data tersimpan.','success');loadForView(document.querySelector('.view.active')?.id.replace('view-','')||'')}catch(e){toast('Gagal',e.message,'error')}finally{hideLoading()}}function approveReg(id){simpleAction('approveRegistration',{regId:id,approvedBy:currentUser.USERNAME},'Registrasi disetujui')}function rejectReg(id){let reason=prompt('Alasan penolakan:','');if(reason!==null)simpleAction('rejectRegistration',{regId:id,rejectedBy:currentUser.USERNAME,reason},'Registrasi ditolak')}function approveLeaveAdmin(id){simpleAction('approveLeave',{leaveId:id,approvedBy:currentUser.USERNAME,catatan:''},'Izin disetujui')}function rejectLeaveAdmin(id){let catatan=prompt('Catatan penolakan:','');if(catatan!==null)simpleAction('rejectLeave',{leaveId:id,rejectedBy:currentUser.USERNAME,catatan},'Izin ditolak')}function validateReport(id,status){let catatanAdmin=prompt('Catatan admin:','')||'';simpleAction('validateWorkReport',{reportId:id,status,validatedBy:currentUser.USERNAME,catatanAdmin},'Laporan diperbarui')}function reviewDocument(id,status){let catatan=prompt('Catatan:','')||'';simpleAction('reviewInternDocument',{docId:id,status,catatan,reviewedBy:currentUser.USERNAME},'Dokumen diperbarui')}function reviewKpi(id){let catatan=prompt('Catatan review:','')||'';simpleAction('reviewKpiTarget',{kpiId:id,reviewedBy:currentUser.USERNAME,catatan},'KPI direview')}function updateKpi(id){let progress=prompt('Progress KPI:','')||'';simpleAction('updateKpiProgress',{kpiId:id,progress,userId:currentUser.USER_ID},'Progress diperbarui')}
function globalClick(e){let f=e.target.closest('#itAttendanceFilter button');if(f){state.filter=f.dataset.filter;document.querySelectorAll('#itAttendanceFilter button').forEach(b=>b.classList.remove('active'));f.classList.add('active');renderAdminAttendance(state.adminAttendance)}if(e.target.closest('[data-open]')){let m=document.getElementById('mainModal');if(m)m.classList.remove('show')}}

function bindDynamicForms(){['formDocument','formKpi','formEvaluation','formCertificate','formLocation','formEvent','formAnnouncement','formNotification'].forEach(id=>{let el=document.getElementById(id);if(el&&!el._b){el._b=1;el.addEventListener('submit',submitDynamicForm)}})}setInterval(bindDynamicForms,1000);async function submitDynamicForm(e){e.preventDefault();let id=e.target.id;if(id==='formDocument'){let file=document.getElementById('docFile').files[0];let base64=file?await fileToBase64(file):'';return simpleAction('uploadInternDocument',{userId:currentUser.USER_ID,jenis:val('docType'),fileBase64:base64,fileName:file?file.name:''},'Dokumen diupload')}if(id==='formKpi')return simpleAction('createKpiTarget',{targetUser:val('kpiUser'),target:val('kpiTitle'),status:val('kpiStatus'),createdBy:currentUser.USERNAME},'KPI dibuat');if(id==='formEvaluation')return simpleAction('submitInternEvaluation',{targetUser:val('evalUser'),nilai:val('evalScore'),catatan:val('evalNote'),createdBy:currentUser.USERNAME},'Evaluasi disimpan');if(id==='formCertificate')return simpleAction('generateInternshipCertificate',{targetUser:val('certUser'),jenis:val('certType'),generatedBy:currentUser.USERNAME},'Dokumen dibuat');if(id==='formLocation')return simpleAction('createAttendanceLocation',{namaLokasi:val('locName'),latitude:val('locLat'),longitude:val('locLng'),radius:val('locRadius'),createdBy:currentUser.USERNAME},'Lokasi disimpan');if(id==='formEvent')return simpleAction('createEvent',{namaEvent:val('eventName'),tanggal:val('eventDate'),lokasi:val('eventLocation'),createdBy:currentUser.USERNAME},'Event dibuat');if(id==='formAnnouncement')return simpleAction('createAnnouncement',{judul:val('annTitle'),isi:val('annBody'),status:val('annStatus'),createdBy:currentUser.USERNAME},'Pengumuman dibuat');if(id==='formNotification')return simpleAction('createNotification',{target:val('notifTarget'),judul:val('notifTitle'),pesan:val('notifMessage'),createdBy:currentUser.USERNAME},'Notifikasi dikirim')}

function addWorkItem(){workItemCounter++;let div=document.createElement('div');div.className='work-item';div.dataset.workItem=workItemCounter;div.innerHTML='<div class="panel-head" style="margin-bottom:10px"><div><h2 style="font-size:15px">Kegiatan '+workItemCounter+'</h2><p>Isi detail</p></div><button type="button" class="btn btn-red remove-work">Hapus</button></div><div class="grid2"><div class="field"><input class="work-start" type="time" placeholder=" "><label>Mulai</label></div><div class="field"><input class="work-end" type="time" placeholder=" "><label>Selesai</label></div></div><div style="height:10px"></div><div class="field"><textarea class="work-desc" placeholder=" " required></textarea><label>Uraian</label></div><div style="height:10px"></div><label class="btn btn-secondary btn-full">Dokumentasi<input class="work-photo file-hidden" type="file" accept="image/*"></label>';document.getElementById('workItems')?.appendChild(div);div.querySelector('.remove-work').addEventListener('click',()=>{if(document.querySelectorAll('[data-work-item]').length<=1)return;div.remove();saveWorkDraft()})}let draftTimer=null;function saveWorkDraftDebounced(){clearTimeout(draftTimer);draftTimer=setTimeout(saveWorkDraft,350)}function saveWorkDraft(){if(!currentUser)return;let items=[...document.querySelectorAll('[data-work-item]')].map(b=>({start:b.querySelector('.work-start').value,end:b.querySelector('.work-end').value,desc:b.querySelector('.work-desc').value}));localStorage.setItem('iTrack_workDraft_'+currentUser.USER_ID,JSON.stringify({date:val('workDate'),division:val('workDivision'),note:val('workNote'),items}));text('draftStatus','Draft tersimpan')}function loadWorkDraft(){try{let raw=localStorage.getItem('iTrack_workDraft_'+currentUser.USER_ID);if(!raw)return;let d=JSON.parse(raw);setValue('workDate',d.date);setValue('workDivision',d.division);setValue('workNote',d.note)}catch(e){}}function clearWorkDraft(){localStorage.removeItem('iTrack_workDraft_'+currentUser.USER_ID);toast('Draft dihapus','Form draft dibersihkan.','success')}async function submitWorkReportForm(e){e.preventDefault();let blocks=[...document.querySelectorAll('[data-work-item]')],items=[];showLoading('Mengirim laporan...','Menyimpan data.');try{for(let b of blocks){let file=b.querySelector('.work-photo').files[0],photo=file?await compressImageFile(file,700,.58):'';items.push({jamMulai:b.querySelector('.work-start').value,jamSelesai:b.querySelector('.work-end').value,uraianKegiatan:b.querySelector('.work-desc').value,photoBase64:photo})}let r=await api('submitWorkReport',{userId:currentUser.USER_ID,tanggal:val('workDate'),divisi:val('workDivision'),catatanUser:val('workNote'),items});if(!r.success)throw new Error(r.message);clearWorkDraft();toast('Laporan terkirim',r.message,'success');loadMyReports()}catch(e){toast('Laporan gagal',e.message,'error')}finally{hideLoading()}}async function submitLeaveForm(e){e.preventDefault();showLoading('Mengirim izin...','Menyimpan data.');try{let f=document.getElementById('leaveProof').files[0],b=f?await compressImageFile(f,700,.58):'';let r=await api('submitLeave',{userId:currentUser.USER_ID,jenisIzin:val('leaveType'),tanggalMulai:val('leaveStart'),tanggalSelesai:val('leaveEnd'),alasan:val('leaveReason'),buktiBase64:b});if(!r.success)throw new Error(r.message);toast('Izin terkirim',r.message,'success');loadMyLeaves()}catch(e){toast('Izin gagal',e.message,'error')}finally{hideLoading()}}function fillProfileForm(){if(!currentUser)return;setValue('profileFullName',currentUser.NAMA_LENGKAP);setValue('profileUsername',currentUser.USERNAME);setValue('profileEmail',currentUser.EMAIL);setValue('profilePhone',currentUser.NO_HP);setValue('profileDivision',currentUser.DIVISI||'Internship / Magang');setValue('profilePosition',currentUser.JABATAN);setLargeAvatar()}async function handleProfilePhoto(e){let f=e.target.files&&e.target.files[0];if(!f)return;let b=await compressImageFile(f,640,.58);simpleAction('updateProfilePhotoBase64',{userId:currentUser.USER_ID,photoBase64:b},'Foto diperbarui')}async function submitProfileDetails(e){e.preventDefault();simpleAction('updateUserProfileDetails',{userId:currentUser.USER_ID,namaLengkap:val('profileFullName'),email:val('profileEmail'),noHp:val('profilePhone'),divisi:val('profileDivision'),jabatan:val('profilePosition')},'Profil diperbarui')}
function loadPeopleList(){api('getAdminData',{}).then(names=>{let arr=Array.isArray(names)?names:[];['attPerson','repPerson','expPerson'].forEach(id=>{let el=document.getElementById(id);if(el)el.innerHTML='<option value="">Semua Peserta</option>'+arr.map(n=>'<option>'+esc(n)+'</option>').join('')})}).catch(()=>{})}async function exportAttendancePdf(x){let r=await api('exportAttendancePdf',exportPayload(x,'attendance'));if(r.success&&r.data&&r.data.fileUrl)window.open(r.data.fileUrl,'_blank');toast(r.success?'Export berhasil':'Export gagal',r.message||'',r.success?'success':'error')}async function exportWorkReportPdf(x){let r=await api('exportWorkReportPdf',exportPayload(x,'report'));if(r.success&&r.data&&r.data.fileUrl)window.open(r.data.fileUrl,'_blank');toast(r.success?'Export berhasil':'Export gagal',r.message||'',r.success?'success':'error')}async function exportAttendanceCsv(){let r=await api('exportAttendanceCsv',exportPayload(true,'attendance'));if(r.success)downloadText('absensi-iTrack.csv',r.data&&r.data.csv?r.data.csv:'')}async function exportWorkCsv(){let r=await api('exportWorkReportCsv',exportPayload(true,'report'));if(r.success)downloadText('laporan-iTrack.csv',r.data&&r.data.csv?r.data.csv:'')}function exportPayload(fromExport,type){if(fromExport)return{startDate:val('expStart'),endDate:val('expEnd'),officerName:val('expPerson'),exportedBy:currentUser?currentUser.USERNAME:'',emailTo:currentUser?currentUser.EMAIL:''};if(type==='report')return{startDate:val('repStart'),endDate:val('repEnd'),officerName:val('repPerson'),exportedBy:currentUser?currentUser.USERNAME:'',emailTo:currentUser?currentUser.EMAIL:''};return{startDate:val('attStart'),endDate:val('attEnd'),officerName:val('attPerson'),exportedBy:currentUser?currentUser.USERNAME:'',emailTo:currentUser?currentUser.EMAIL:''}}
function openModal(html){document.getElementById('mainModalCard').innerHTML=html;document.getElementById('mainModal').classList.add('show')}function closeModal(){document.getElementById('mainModal').classList.remove('show')}document.getElementById('mainModal').addEventListener('click',e=>{if(e.target.id==='mainModal')closeModal()});function initDates(){let n=new Date();text('todayLabel',formatLongDate(n));text('todayAdminLabel',formatLongDate(n));text('attendanceDateLabel',formatLongDate(n))}function setDefaultDates(){let d=toDateInput(new Date());['workDate','leaveStart','leaveEnd','attStart','attEnd','repStart','repEnd','expStart','expEnd','eventDate'].forEach(id=>{let el=document.getElementById(id);if(el)el.value=d})}function updateUserUI(){text('topName',currentUser.NAMA_LENGKAP||currentUser.USERNAME);text('topRole',(currentUser.ROLE||'-')+' • '+(currentUser.STATUS_AKUN||'-'));let av=document.getElementById('topAvatar');av.textContent=(currentUser.NAMA_LENGKAP||currentUser.USERNAME||'I').charAt(0).toUpperCase();if(currentUser.PHOTO_URL){av.style.backgroundImage='url("'+currentUser.PHOTO_URL+'")';av.textContent=''}}function setLargeAvatar(){let av=document.getElementById('profileAvatar');if(!av||!currentUser)return;av.textContent=(currentUser.NAMA_LENGKAP||currentUser.USERNAME||'I').charAt(0).toUpperCase();if(currentUser.PHOTO_URL){av.style.backgroundImage='url("'+currentUser.PHOTO_URL+'")';av.textContent=''}}function normalizeUser(u){u=u||{};return{USER_ID:u.USER_ID||u.userId||'',USERNAME:u.USERNAME||u.username||'',NAMA_LENGKAP:u.NAMA_LENGKAP||u.namaLengkap||u.name||'',ROLE:u.ROLE||u.role||'',STATUS_AKUN:u.STATUS_AKUN||u.statusAkun||u.status||'',PHOTO_URL:u.PHOTO_URL||u.photoUrl||u.photo||'',EMAIL:u.EMAIL||u.email||'',DIVISI:u.DIVISI||u.divisi||'',JABATAN:u.JABATAN||u.jabatan||'',NO_HP:u.NO_HP||u.noHp||'',TANGGAL_MULAI_MAGANG:u.TANGGAL_MULAI_MAGANG||'',TANGGAL_SELESAI_MAGANG:u.TANGGAL_SELESAI_MAGANG||''}}function isAdminRole(r){r=String(r||'').toUpperCase();return['SUPER_ADMIN','SUPERADMIN','ADMIN','SUPERVISOR'].includes(r)}function clearSensitive(){['loginPassword','regPassword','regPassword2','otpPassword','otpPassword2'].forEach(id=>{let e=document.getElementById(id);if(e)e.value=''})}function badge(v){let s=String(v||'-').toUpperCase(),c='badge-default';if(['AKTIF','HADIR','DISETUJUI','VALID','SELESAI'].includes(s))c='badge-success';if(['TERLAMBAT','MENUNGGU','MENUNGGU_REVIEW','MENUNGGU_VERIFIKASI','REVISI','PERLU_REVIEW'].includes(s))c='badge-warning';if(['IZIN','SAKIT','DINAS_LUAR','IZIN_PRIBADI','CUTI','LUAR_LOKASI'].includes(s))c='badge-info';if(['DITOLAK','NONAKTIF','ALPHA','INVALID'].includes(s))c='badge-danger';return'<span class="badge '+c+'">'+esc(displayStatus(s))+'</span>'}function displayStatus(s){return String(s||'-').replace(/_/g,' ').toLowerCase().replace(/(^|\s)\S/g,a=>a.toUpperCase())}function rowHtml(values,labels){return'<tr>'+values.map((v,i)=>'<td data-label="'+esc(labels[i])+'">'+(v==null?'':v)+'</td>').join('')+'</tr>'}function val(id){let e=document.getElementById(id);return e?String(e.value||'').trim():''}function setValue(id,v){let e=document.getElementById(id);if(e)e.value=v||''}function text(id,v){let e=document.getElementById(id);if(e)e.textContent=v==null?'':v}function esc(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}function escAttr(v){return esc(v).replace(/`/g,'&#096;')}function toDateInput(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}function formatDateID(v){if(!v)return'-';let s=String(v).split(' ')[0],p=s.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:s}function formatLongDate(d){return d.toLocaleDateString('id-ID',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})}function formatDateTimeID(d){return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}function onlyTime(v){if(!v)return'--:--';let m=String(v).match(/(\d{1,2}):(\d{2})/);return m?String(m[1]).padStart(2,'0')+':'+m[2]:String(v)}function serverTimeDisplay(){return serverTimeData&&serverTimeData.serverNowDisplay?serverTimeData.serverNowDisplay:formatDateTimeID(new Date())+' WIB'}function shortDuration(v){return String(v||'0 jam 0 menit').replace(' jam ','j ').replace(' menit','m')}function distanceMeters(a,b,c,d){let R=6371000,rad=x=>x*Math.PI/180,dl=rad(c-a),dn=rad(d-b),x=Math.sin(dl/2)**2+Math.cos(rad(a))*Math.cos(rad(c))*Math.sin(dn/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}function downloadText(name,content){let blob=new Blob([content],{type:'text/plain;charset=utf-8'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),800)}function fileToBase64(file){return new Promise((res,rej)=>{let r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=()=>rej(new Error('Gagal membaca file'));r.readAsDataURL(file)})}function compressVideoFrame(v,w,q){return new Promise((res,rej)=>{try{let cw=v.videoWidth||960,ch=v.videoHeight||720,ratio=Math.min(w/cw,1),nw=Math.round(cw*ratio),nh=Math.round(ch*ratio),c=document.createElement('canvas');c.width=nw;c.height=nh;c.getContext('2d').drawImage(v,0,0,nw,nh);res(c.toDataURL('image/jpeg',q||.55))}catch(e){rej(e)}})}function compressImageFile(file,w,q){return new Promise((res,rej)=>{let r=new FileReader();r.onload=e=>{let img=new Image();img.onload=()=>{let ratio=Math.min(w/img.width,1),nw=Math.round(img.width*ratio),nh=Math.round(img.height*ratio),c=document.createElement('canvas');c.width=nw;c.height=nh;c.getContext('2d').drawImage(img,0,0,nw,nh);res(c.toDataURL('image/jpeg',q||.55))};img.onerror=()=>rej(new Error('File gambar tidak valid'));img.src=e.target.result};r.onerror=()=>rej(new Error('Gagal memba
