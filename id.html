<script id="itrack-final-report-datetime-stable">
(function(){
  'use strict';

  /**
   * Patch ini sengaja tidak mengubah UI/UX sama sekali.
   * Yang diperbaiki hanya data tanggal/jam yang masuk dari backend sebelum dirender frontend.
   * Masalah utama biasanya: Apps Script / Google Sheets mengirim Date sebagai ISO UTC,
   * sehingga 2026-06-10T17:00:00.000Z seharusnya tampil 11/06/2026 WIB,
   * tapi frontend lama membaca mentah dan tampil mundur.
   */

  var TZ = 'Asia/Jakarta';

  function pad(value){
    return String(value).padStart(2,'0');
  }

  function isDateObject(value){
    return Object.prototype.toString.call(value) === '[object Date]' && !isNaN(value.getTime());
  }

  function clean(value){
    return value === null || value === undefined ? '' : String(value).trim();
  }

  function partsDateJakarta(date){
    try{
      var parts = new Intl.DateTimeFormat('en-CA', {
        timeZone: TZ,
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      }).formatToParts(date);

      var out = {};
      parts.forEach(function(part){
        out[part.type] = part.value;
      });

      return {
        y: out.year,
        m: out.month,
        d: out.day
      };
    }catch(error){
      return {
        y: date.getFullYear(),
        m: pad(date.getMonth() + 1),
        d: pad(date.getDate())
      };
    }
  }

  function partsTimeJakarta(date){
    try{
      var parts = new Intl.DateTimeFormat('en-GB', {
        timeZone: TZ,
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      }).formatToParts(date);

      var out = {};
      parts.forEach(function(part){
        out[part.type] = part.value;
      });

      return {
        h: out.hour,
        m: out.minute,
        s: out.second || '00'
      };
    }catch(error){
      return {
        h: pad(date.getHours()),
        m: pad(date.getMinutes()),
        s: pad(date.getSeconds())
      };
    }
  }

  function dateFromExcelSerial(value){
    var number = Number(value);
    var ms = Math.round((number - 25569) * 86400 * 1000);
    return new Date(ms);
  }

  function isIsoDateTime(text){
    return /^\d{4}-\d{2}-\d{2}T/.test(text) || /Z$/.test(text);
  }

  function isIsoDateOnly(text){
    return /^\d{4}-\d{2}-\d{2}$/.test(text);
  }

  function stableIsoDate(value){
    if(value === null || value === undefined || value === '') return '';

    if(isDateObject(value)){
      var p0 = partsDateJakarta(value);
      return p0.y + '-' + p0.m + '-' + p0.d;
    }

    if(typeof value === 'number' && isFinite(value)){
      var dn = dateFromExcelSerial(value);
      var pn = partsDateJakarta(dn);
      return pn.y + '-' + pn.m + '-' + pn.d;
    }

    var text = clean(value);
    if(!text) return '';

    var dmy = text.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
    if(dmy){
      return dmy[3] + '-' + pad(dmy[2]) + '-' + pad(dmy[1]);
    }

    if(isIsoDateOnly(text)){
      return text.substring(0,10);
    }

    if(isIsoDateTime(text)){
      var date = new Date(text);
      if(!isNaN(date.getTime())){
        var p = partsDateJakarta(date);
        return p.y + '-' + p.m + '-' + p.d;
      }
    }

    var embedded = text.match(/(\d{4})-(\d{2})-(\d{2})/);
    if(embedded){
      return embedded[1] + '-' + embedded[2] + '-' + embedded[3];
    }

    return text;
  }

  function stableDisplayDate(value){
    var iso = stableIsoDate(value);
    var m = String(iso || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if(m) return m[3] + '/' + m[2] + '/' + m[1];
    return iso || '-';
  }

  function stableTime(value){
    if(value === null || value === undefined || value === '') return '--:--';

    if(isDateObject(value)){
      var t0 = partsTimeJakarta(value);
      return t0.h + ':' + t0.m;
    }

    if(typeof value === 'number' && isFinite(value)){
      if(value >= 0 && value < 1){
        var total = Math.round(value * 24 * 60);
        return pad(Math.floor(total / 60) % 24) + ':' + pad(total % 60);
      }

      var dn = dateFromExcelSerial(value);
      var tn = partsTimeJakarta(dn);
      return tn.h + ':' + tn.m;
    }

    var text = clean(value);
    if(!text) return '--:--';

    var direct = text.match(/^(\d{1,2}):(\d{2})(?::\d{2})?$/);
    if(direct){
      return pad(direct[1]) + ':' + direct[2];
    }

    if(isIsoDateTime(text)){
      var date = new Date(text);
      if(!isNaN(date.getTime())){
        var t = partsTimeJakarta(date);
        return t.h + ':' + t.m;
      }
    }

    var embedded = text.match(/(?:T|\s)(\d{1,2}):(\d{2})/);
    if(embedded){
      return pad(embedded[1]) + ':' + embedded[2];
    }

    return text;
  }

  function stableDateTime(value){
    if(value === null || value === undefined || value === '') return '';

    if(isDateObject(value) || isIsoDateTime(clean(value))){
      var date = isDateObject(value) ? value : new Date(clean(value));
      if(!isNaN(date.getTime())){
        var p = partsDateJakarta(date);
        var t = partsTimeJakarta(date);
        return p.y + '-' + p.m + '-' + p.d + ' ' + t.h + ':' + t.m + ':' + t.s;
      }
    }

    var text = clean(value);
    if(isIsoDateOnly(text)) return text;
    return text;
  }

  function keyNorm(key){
    return String(key || '').toLowerCase().replace(/[\s_\-.]/g,'');
  }

  function isDateOnlyKey(key){
    var k = keyNorm(key);
    return (
      k === 'tanggal' ||
      k === 'date' ||
      k === 'tanggallaporan' ||
      k === 'tanggalabsensi' ||
      k === 'tanggalpengajuan' ||
      k === 'tanggalmulai' ||
      k === 'tanggalselesai' ||
      k === 'periodeawal' ||
      k === 'periodeakhir'
    );
  }

  function isTimeOnlyKey(key){
    var k = keyNorm(key);
    return (
      k === 'jammasuk' ||
      k === 'jampulang' ||
      k === 'jammulai' ||
      k === 'jamselesai' ||
      k === 'checkin' ||
      k === 'checkout' ||
      k === 'start' ||
      k === 'end'
    );
  }

  function isDateTimeKey(key){
    var k = keyNorm(key);
    return (
      k === 'createdat' ||
      k === 'updatedat' ||
      k === 'validatedat' ||
      k === 'approvedat' ||
      k === 'rejectedat' ||
      k === 'dibuatpada' ||
      k === 'diperbaruipada' ||
      k === 'divalidasipada' ||
      k === 'disetujuipada' ||
      k === 'ditolakpada' ||
      k === 'loginterakhir' ||
      k === 'lastlogin'
    );
  }

  function normalizeBackendValue(key, value){
    if(value === null || value === undefined || value === '') return value;

    if(isDateOnlyKey(key)){
      return stableIsoDate(value);
    }

    if(isTimeOnlyKey(key)){
      return stableTime(value);
    }

    if(isDateTimeKey(key)){
      return stableDateTime(value);
    }

    return value;
  }

  function normalizeBackendObject(input){
    if(!input) return input;

    if(Array.isArray(input)){
      for(var i = 0; i < input.length; i++){
        input[i] = normalizeBackendObject(input[i]);
      }
      return input;
    }

    if(typeof input === 'object'){
      Object.keys(input).forEach(function(key){
        var value = input[key];

        if(value && typeof value === 'object' && !isDateObject(value)){
          input[key] = normalizeBackendObject(value);
        }else{
          input[key] = normalizeBackendValue(key, value);
        }
      });
    }

    return input;
  }

  /**
   * Override global formatter yang dipakai tabel/detail lama.
   */
  window.iTrackDateTimeStable = {
    timezone: TZ,
    isoDate: stableIsoDate,
    displayDate: stableDisplayDate,
    time: stableTime,
    dateTime: stableDateTime,
    normalizeResponse: normalizeBackendObject
  };

  window.formatDateID = function(value){
    return stableDisplayDate(value);
  };

  window.onlyTime = function(value){
    return stableTime(value);
  };

  window.toDateInput = function(value){
    return stableIsoDate(value);
  };

  window.formatDateTimeID = function(value){
    var normalized = stableDateTime(value);
    var d = stableDisplayDate(normalized);
    var t = stableTime(normalized);
    return d + (t && t !== '--:--' ? ' ' + t : '');
  };

  /**
   * Ini bagian paling penting:
   * semua response API dinormalisasi dulu sebelum masuk ke renderMyReports,
   * renderAdminReports, renderReportDetail, detail revisi, export preview, dll.
   */
  var oldApi = window.api;

  if(typeof oldApi === 'function' && !oldApi.__itrackDateTimeStableWrapped){
    var wrappedApi = async function(action, payload){
      var result = await oldApi.apply(this, arguments);
      return normalizeBackendObject(result);
    };

    wrappedApi.__itrackDateTimeStableWrapped = true;
    window.api = wrappedApi;
  }

  /**
   * Kalau tabel sudah ter-render sebelum patch ini aktif, refresh ringan.
   * Tidak mengubah UI, hanya minta data ulang agar tanggal/jam normal.
   */
  setTimeout(function(){
    try{ if(typeof window.loadMyReports === 'function') window.loadMyReports(); }catch(e){}
    try{ if(typeof window.loadAdminReports === 'function') window.loadAdminReports(); }catch(e){}
    try{ if(typeof window.loadMyLeaves === 'function') window.loadMyLeaves(); }catch(e){}
    try{ if(typeof window.loadAdminLeaves === 'function') window.loadAdminLeaves(); }catch(e){}
  }, 400);

  console.warn('[iTrack] Final report datetime stable aktif. Semua tanggal/jam laporan dinormalisasi ke Asia/Jakarta sebelum render.');
})();
</script>

<script id="itrack-fix-edit-revisi-card-v4">
(function(){
  'use strict';

  var CACHE = [];
  var CACHE_AT = 0;

  function txt(el){ return String((el && (el.innerText || el.textContent)) || '').trim(); }
  function norm(s){ return String(s || '').toLowerCase().replace(/\s+/g,' ').trim(); }
  function upper(s){ return String(s || '').toUpperCase(); }

  function user(){
    try{ if(window.currentUser) return window.currentUser; }catch(e){}
    try{ return JSON.parse(localStorage.getItem('iTrack_user') || localStorage.getItem('itrack_current_user') || '{}'); }catch(e){ return {}; }
  }

  function any(row, keys){
    row = row || {};
    for(var i=0;i<keys.length;i++){
      if(row[keys[i]] !== undefined && row[keys[i]] !== null && row[keys[i]] !== '') return row[keys[i]];
    }
    return '';
  }

  function rowsOf(res){
    if(!res) return [];
    if(Array.isArray(res)) return res;
    if(Array.isArray(res.data)) return res.data;
    var keys = ['rows','items','reports','laporan','workReports','data'];
    for(var i=0;i<keys.length;i++){
      if(res.data && Array.isArray(res.data[keys[i]])) return res.data[keys[i]];
    }
    return [];
  }

  function reportId(row){
    return any(row, ['REPORT_ID','reportId','ID_LAPORAN','idLaporan','ID Laporan','id','ID']);
  }

  function status(row){
    return upper(any(row, ['STATUS_LAPORAN','statusLaporan','Status Laporan','status']));
  }

  function dateDisplay(value){
    if(window.iTrackDateTimeStable && window.iTrackDateTimeStable.displayDate){
      return window.iTrackDateTimeStable.displayDate(value);
    }
    if(typeof window.formatDateID === 'function') return window.formatDateID(value);
    var s = String(value || '');
    var m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if(m) return m[3] + '/' + m[2] + '/' + m[1];
    return s;
  }

  async function getReports(force){
    if(!force && CACHE.length && Date.now() - CACHE_AT < 12000) return CACHE;

    if(Array.isArray(window.__iTrackMyReports) && window.__iTrackMyReports.length){
      CACHE = window.__iTrackMyReports;
      CACHE_AT = Date.now();
      return CACHE;
    }

    if(typeof window.api !== 'function') return [];

    var u = user();
    var payload = {
      userId: u.USER_ID || u.userId || '',
      username: u.USERNAME || u.username || ''
    };

    var actions = ['getMyWorkReports','getUserReports','getWorkReportsForUser'];

    for(var i=0;i<actions.length;i++){
      try{
        var res = await window.api(actions[i], payload);
        var rows = rowsOf(res);

        if(rows.length){
          CACHE = rows;
          CACHE_AT = Date.now();
          window.__iTrackMyReports = rows;
          return rows;
        }
      }catch(e){}
    }

    return [];
  }

  function findReportCards(){
    var nodes = Array.prototype.slice.call(document.querySelectorAll('div, article, section, li, tr'));
    var cards = [];

    nodes.forEach(function(el){
      var text = txt(el);
      if(!text) return;

      if(upper(text).indexOf('STATUS: REVISI') === -1 && upper(text).indexOf('REVISI') === -1) return;

      var detailBtn = Array.prototype.find.call(el.querySelectorAll('button'), function(b){
        return norm(b.textContent) === 'detail';
      });

      if(!detailBtn) return;

      var likely =
        norm(text).indexOf('divisi') >= 0 &&
        norm(text).indexOf('kegiatan') >= 0 &&
        norm(text).indexOf('durasi') >= 0;

      if(likely) cards.push(el);
    });

    return cards.filter(function(card){
      return !cards.some(function(other){
        return other !== card && other.contains(card);
      });
    });
  }

  function matchByText(card, reports, index){
    var cardText = txt(card);

    var byIndex = reports[index];
    if(byIndex && status(byIndex).indexOf('REVISI') >= 0) return byIndex;

    for(var i=0;i<reports.length;i++){
      var r = reports[i];

      if(status(r).indexOf('REVISI') < 0) continue;

      var d = dateDisplay(any(r, ['TANGGAL','Tanggal','tanggal','date']));
      var div = any(r, ['DIVISI','Divisi','divisi']);
      var dur = any(r, ['TOTAL_DURASI','Total Durasi','totalDurasi']);

      var okDate = d && cardText.indexOf(d) >= 0;
      var okDiv = !div || norm(cardText).indexOf(norm(div)) >= 0;
      var okDur = !dur || norm(cardText).indexOf(norm(dur)) >= 0;

      if(okDate && okDiv && okDur) return r;
    }

    return null;
  }

  function cleanupDuplicateButtons(card){
    card.querySelectorAll(
      '[data-edit-revision-report],' +
      '[data-user-edit-revision],' +
      '[data-irx-edit-revision],' +
      '[data-irz-single-edit],' +
      '[data-isr-edit-revision],' +
      '.edit-revision-report'
    ).forEach(function(btn){
      try{ btn.remove(); }catch(e){ btn.style.display = 'none'; }
    });

    Array.prototype.slice.call(card.querySelectorAll('button')).forEach(function(btn){
      if(norm(btn.textContent) === 'edit revisi'){
        try{ btn.remove(); }catch(e){ btn.style.display = 'none'; }
      }
    });
  }

  function openEditor(id){
    if(!id){
      if(typeof window.toast === 'function'){
        window.toast('ID laporan kosong','Tidak bisa membuka revisi karena ID laporan tidak ditemukan.','error');
      }else{
        alert('ID laporan kosong.');
      }
      return;
    }

    if(typeof window.openRevisionReportEditor === 'function'){
      window.openRevisionReportEditor(id);
      return;
    }

    if(typeof window.iTrackOpenRevisionEditor === 'function'){
      window.iTrackOpenRevisionEditor(id);
      return;
    }

    if(typeof window.toast === 'function'){
      window.toast('Editor revisi belum aktif','Pastikan id.html final sudah memuat fungsi openRevisionReportEditor.', 'error');
    }else{
      alert('Editor revisi belum aktif. Pastikan id.html final sudah memuat fungsi openRevisionReportEditor.');
    }
  }

  async function inject(){
    var cards = findReportCards();
    if(!cards.length) return;

    var reports = await getReports(false);

    cards.forEach(function(card, index){
      cleanupDuplicateButtons(card);

      var report = matchByText(card, reports, index);
      var id = reportId(report) || card.getAttribute('data-report-id') || card.getAttribute('data-id') || '';

      if(!id) return;

      card.setAttribute('data-report-id', id);

      var detailBtn = Array.prototype.find.call(card.querySelectorAll('button'), function(b){
        return norm(b.textContent) === 'detail';
      });

      if(!detailBtn) return;

      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = detailBtn.className || 'btn btn-secondary';
      btn.textContent = 'Edit Revisi';
      btn.setAttribute('data-edit-revision-report', id);
      btn.style.marginTop = '8px';

      btn.onclick = function(event){
        event.preventDefault();
        event.stopPropagation();
        openEditor(id);
      };

      detailBtn.insertAdjacentElement('afterend', btn);
    });
  }

  var oldRender = window.renderMyReports;

  if(typeof oldRender === 'function' && !oldRender.__fixCardRevisionV4){
    window.renderMyReports = function(rows){
      window.__iTrackMyReports = Array.isArray(rows) ? rows : [];

      var result = oldRender.apply(this, arguments);

      setTimeout(inject, 80);
      setTimeout(inject, 500);

      return result;
    };

    window.renderMyReports.__fixCardRevisionV4 = true;
  }

  document.addEventListener('click', function(event){
    var btn = event.target && event.target.closest
      ? event.target.closest('[data-edit-revision-report]')
      : null;

    if(!btn) return;

    event.preventDefault();
    event.stopPropagation();

    openEditor(btn.getAttribute('data-edit-revision-report'));
  }, true);

  var observer = new MutationObserver(function(){
    clearTimeout(observer.__timer);
    observer.__timer = setTimeout(inject, 200);
  });

  function boot(){
    try{
      observer.observe(document.body, {
        childList: true,
        subtree: true
      });
    }catch(e){}

    setTimeout(inject, 300);
    setTimeout(inject, 1200);
    setTimeout(inject, 2500);
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', boot);
  }else{
    boot();
  }

  window.iTrackFixRevisionCardButton = inject;

  console.warn('[iTrack] Fix Edit Revisi card v4 aktif. Tombol akan muncul pada card Status: REVISI.');
})();
</script>

      'laporan',
      'workReports',
      'data'
    ];

    for(var i = 0; i < keys.length; i++){
      if(response.data && Array.isArray(response.data[keys[i]])){
        return response.data[keys[i]];
      }
    }

    return [];
  }

  async function apiCall(action, payload){
    if(typeof window.api !== 'function'){
      throw new Error('Fungsi API frontend tidak tersedia.');
    }

    return await window.api(action, payload || {});
  }

  async function callFirst(actions, payload){
    var lastError = null;

    for(var i = 0; i < actions.length; i++){
      try{
        var result = await apiCall(actions[i], payload || {});

        if(result && result.success === false){
          lastError = new Error(result.message || ('Action gagal: ' + actions[i]));
          continue;
        }

        return result;
      }catch(error){
        lastError = error;
      }
    }

    throw lastError || new Error('Action backend revisi belum tersedia.');
  }

  function isoDate(value){
    if(window.iTrackDateTimeStable && window.iTrackDateTimeStable.isoDate){
      return window.iTrackDateTimeStable.isoDate(value);
    }

    var s = String(value || '');

    if(/^\d{4}-\d{2}-\d{2}/.test(s)){
      return s.slice(0,10);
    }

    return s;
  }

  function displayDate(value){
    if(window.iTrackDateTimeStable && window.iTrackDateTimeStable.displayDate){
      return window.iTrackDateTimeStable.displayDate(value);
    }

    if(typeof window.formatDateID === 'function'){
      return window.formatDateID(value);
    }

    var s = isoDate(value);
    var m = String(s).match(/^(\d{4})-(\d{2})-(\d{2})$/);

    if(m){
      return m[3] + '/' + m[2] + '/' + m[1];
    }

    return s || '-';
  }

  function displayTime(value){
    if(window.iTrackDateTimeStable && window.iTrackDateTimeStable.time){
      return window.iTrackDateTimeStable.time(value);
    }

    if(typeof window.onlyTime === 'function'){
      return window.onlyTime(value);
    }

    var m = String(value || '').match(/(\d{1,2}):(\d{2})/);

    if(m){
      return String(m[1]).padStart(2,'0') + ':' + m[2];
    }

    return '';
  }

  function driveView(url){
    url = String(url || '').trim();

    if(!url) return '';

    var m1 = url.match(/drive\.google\.com\/file\/d\/([^/]+)/);

    if(m1 && m1[1]){
      return 'https://drive.google.com/uc?export=view&id=' + m1[1];
    }

    var m2 = url.match(/[?&]id=([^&]+)/);

    if(url.indexOf('drive.google.com') !== -1 && m2 && m2[1]){
      return 'https://drive.google.com/uc?export=view&id=' + m2[1];
    }

    return url;
  }

  async function getReports(force){
    if(!force && CACHE.length && Date.now() - CACHE_AT < 12000){
      return CACHE;
    }

    if(Array.isArray(window.__iTrackMyReports) && window.__iTrackMyReports.length){
      CACHE = window.__iTrackMyReports;
      CACHE_AT = Date.now();
      return CACHE;
    }

    if(typeof window.api !== 'function'){
      return [];
    }

    var user = current();

    var payload = {
      userId: user.USER_ID || user.userId || '',
      username: user.USERNAME || user.username || ''
    };

    var actions = [
      'getMyWorkReports',
      'getUserReports',
      'getWorkReportsForUser'
    ];

    for(var i = 0; i < actions.length; i++){
      try{
        var res = await window.api(actions[i], payload);
        var rows = rowsOf(res);

        if(rows.length){
          CACHE = rows;
          CACHE_AT = Date.now();
          window.__iTrackMyReports = rows;
          return rows;
        }
      }catch(error){}
    }

    return [];
  }

  function findCards(){
    var nodes = Array.prototype.slice.call(
      document.querySelectorAll('div, article, section, li, tr')
    );

    var cards = [];

    nodes.forEach(function(el){
      var text = textOf(el);

      if(!text) return;

      var hasRevision =
        upper(text).indexOf('STATUS: REVISI') !== -1 ||
        upper(text).indexOf('REVISI') !== -1;

      if(!hasRevision) return;

      var detailButton = Array.prototype.find.call(el.querySelectorAll('button'), function(button){
        return norm(button.textContent) === 'detail';
      });

      if(!detailButton) return;

      var likelyReportCard =
        norm(text).indexOf('divisi') !== -1 &&
        norm(text).indexOf('kegiatan') !== -1 &&
        norm(text).indexOf('durasi') !== -1;

      if(likelyReportCard){
        cards.push(el);
      }
    });

    return cards.filter(function(card){
      return !cards.some(function(other){
        return other !== card && other.contains(card);
      });
    });
  }

  function matchReport(card, reports, index){
    var cardText = textOf(card);

    var byIndex = reports[index];

    if(byIndex && getStatus(byIndex).indexOf('REVISI') !== -1){
      return byIndex;
    }

    for(var i = 0; i < reports.length; i++){
      var report = reports[i];

      if(getStatus(report).indexOf('REVISI') === -1) continue;

      var tanggal = displayDate(any(report, [
        'TANGGAL',
        'Tanggal',
        'tanggal',
        'date'
      ]));

      var divisi = any(report, [
        'DIVISI',
        'Divisi',
        'divisi'
      ]);

      var durasi = any(report, [
        'TOTAL_DURASI',
        'Total Durasi',
        'totalDurasi'
      ]);

      var okTanggal = tanggal && cardText.indexOf(tanggal) !== -1;
      var okDivisi = !divisi || norm(cardText).indexOf(norm(divisi)) !== -1;
      var okDurasi = !durasi || norm(cardText).indexOf(norm(durasi)) !== -1;

      if(okTanggal && okDivisi && okDurasi){
        return report;
      }
    }

    return null;
  }

  function bindEditor(){
    var add = q('irv5AddItem');
    var cancel = q('irv5Cancel');
    var submit = q('irv5Submit');

    if(add){
      add.onclick = function(){
        var box = q('irv5Items');
        if(!box) return;

        var empty = box.querySelector('.irv5-empty');
        if(empty) empty.remove();

        var count = box.querySelectorAll('[data-irv5-item]').length;

        if(count >= 10){
          notify('warning', 'Maksimal kegiatan', 'Satu laporan maksimal 10 kegiatan.');
          return;
        }

        box.insertAdjacentHTML('beforeend', itemHtml({}, count));
        bindEditor();
        renumber();
      };
    }

    if(cancel){
      cancel.onclick = closeModal;
    }

    if(submit){
      submit.onclick = submitRevision;
    }

    document.querySelectorAll('[data-irv5-remove]').forEach(function(button){
      if(button.__irv5Bound) return;

      button.__irv5Bound = true;

      button.onclick = function(){
        var item = button.closest('[data-irv5-item]');

        if(item){
          item.remove();
        }

        renumber();
      };
    });

    document.querySelectorAll('.irv5Photo').forEach(function(input){
      if(input.__irv5Bound) return;

      input.__irv5Bound = true;

      input.onchange = function(){
        var file = input.files && input.files[0];

        if(!file) return;

        var reader = new FileReader();

        reader.onload = function(event){
          input.dataset.base64 = event.target.result;

          var thumb = input.closest('[data-irv5-item]').querySelector('.irv5-thumb');

          if(thumb){
            thumb.innerHTML = '<img src="' + attr(event.target.result) + '" alt="Preview">';
          }
        };

        reader.readAsDataURL(file);
      };
    });
  }

    document.querySelectorAll('#irv5Items [data-irv5-item]').forEach(function(item, index){
      var photo = item.querySelector('.irv5Photo');
      var base64 = photo && photo.dataset ? photo.dataset.base64 || '' : '';

      items.push({

        photoBase64: base64,

      });

  async function submitRevision(){
    var payload = collectPayload();

    if(!payload.reportId){
      notify('error', 'ID kosong', 'ID laporan tidak ditemukan.');
      return;
    }

    if(!payload.tanggal){
      notify('warning', 'Tanggal wajib', 'Tanggal laporan belum diisi.');
      return;
    }

    if(!payload.items.length){
      notify('warning', 'Kegiatan kosong', 'Minimal satu kegiatan wajib diisi.');
      return;
    }

    for(var i = 0; i < payload.items.length; i++){
      if(!payload.items[i].jamMulai || !payload.items[i].jamSelesai || !payload.items[i].uraianKegiatan){
        notify('warning', 'Belum lengkap', 'Kegiatan ' + (i + 1) + ' wajib lengkap.');
        return;
      }
    }

    if(!confirm('Kirim ulang revisi laporan ini?')) return;

    var token = showLoad('Mengirim revisi...', 'Menyimpan perubahan laporan.');

    try{
      var res = await callFirst([
        'resubmitWorkReportRevision',
        'updateWorkReportRevision',
        'submitWorkReportRevision',
        'resubmitReportRevision',
        'editWorkReportRevision'
      ], payload);

      if(res && res.success === false){
        throw new Error(res.message || 'Gagal mengirim revisi.');
      }

      notify('success', 'Revisi terkirim', 'Laporan dikirim ulang dan menunggu validasi admin.');
      closeModal();

      if(typeof window.loadMyReports === 'function'){
        window.loadMyReports();
      }

      if(typeof window.loadRecentActivities === 'function'){
        window.loadRecentActivities();
      }

    }catch(error){
      notify('error', 'Gagal mengirim revisi', error.message || 'Terjadi kesalahan.');
    }finally{
      hideLoad(token);
    }
  }

  function addButtons(){
    getReports(false).then(function(reports){
      var cards = findCards();

      cards.forEach(function(card, index){
        cleanButtons(card);

        var report = matchReport(card, reports, index);
        var id = getReportId(report) || card.getAttribute('data-report-id') || '';

        if(!id && reports.length === 1){
          id = getReportId(reports[0]);
        }

        if(!id) return;

        card.setAttribute('data-report-id', id);

        var detailButton = Array.prototype.find.call(card.querySelectorAll('button'), function(button){
          return norm(button.textContent) === 'detail';
        });

        if(!detailButton) return;

        var button = document.createElement('button');
        button.type = 'button';
        button.className = detailButton.className || 'btn btn-secondary';
        button.textContent = 'Edit Revisi';
        button.setAttribute('data-edit-revision-report', id);
        button.style.marginTop = '8px';

        button.onclick = function(event){
          event.preventDefault();
          event.stopPropagation();
          openEditor(id);
        };

        detailButton.insertAdjacentElement('afterend', button);
      });
    });
  }

      setTimeout(addButtons, 80);
      setTimeout(addButtons, 500);
      setTimeout(addButtons, 1200);

      return result;
    };

    window.renderMyReports.__irv5Wrapped = true;
  }

  document.addEventListener('click', function(event){
    var button = event.target && event.target.closest
      ? event.target.closest('[data-edit-revision-report]')
      : null;

    if(!button) return;

    event.preventDefault();
    event.stopPropagation();

    openEditor(button.getAttribute('data-edit-revision-report'));
  }, true);

  var observer = new MutationObserver(function(){
    clearTimeout(observer.__timer);
    observer.__timer = setTimeout(addButtons, 180);
  });

  function boot(){
    try{
      observer.observe(document.body, {
        childList: true,
        subtree: true
      });
    }catch(error){}

    setTimeout(addButtons, 300);
    setTimeout(addButtons, 1000);
    setTimeout(addButtons, 2500);
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', boot);
  }else{
    boot();
  }

  console.warn('[iTrack] Revisi V5 aktif. Tombol dan popup editor siap.');
})();
</script>
</body></html>
